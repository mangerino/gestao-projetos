}

// ── CATÁLOGO DE MATERIAIS (era "Catálogo") ── C.2, em ordem alfabética ────────
function CatalogPage({ listas, updateListas, addToast }) {
  const [search, setSearch] = useState(''); const [catF, setCatF] = useState('');
  const [showNew, setShowNew] = useState(false);
  const [form, setForm] = useState({ Categoria:'', Descricao:'', Especificacao:'', Unidade:'unidade', Preco_Medio:0 });
  const [editIdx, setEditIdx] = useState(null); // índice no array listas.catalogo
  const [editForm, setEditForm] = useState(null);

  const cats = [...new Set(listas.catalogo.map(c=>c.Categoria))].sort();
  // ordenado alfabeticamente por Descrição
  const filtered = [...listas.catalogo]
    .filter(c => (!catF || c.Categoria===catF) && (!search || c.Descricao?.toLowerCase().includes(search.toLowerCase())))
    .sort((a,b) => (a.Descricao||'').localeCompare(b.Descricao||'', 'pt-BR'));

  const saveItem = () => {
    if (!form.Descricao) { addToast('Informe a descrição.','error'); return; }
    updateListas(l=>({...l,catalogo:[...l.catalogo,{...form}]}));
    setForm({ Categoria:'', Descricao:'', Especificacao:'', Unidade:'unidade', Preco_Medio:0 });
    setShowNew(false); addToast('Item cadastrado no catálogo!','success');
  };
  const delItem = (descricao, categoria) => {
    updateListas(l=>({...l,catalogo:l.catalogo.filter(x=>!(x.Descricao===descricao&&x.Categoria===categoria))}));
    addToast('Item removido.','info');
  };
  const startEdit = (item) => {
    // encontra índice real no array original (não no filtered/sorted)
    const idx = listas.catalogo.findIndex(x=>x.Descricao===item.Descricao&&x.Categoria===item.Categoria);
    setEditIdx(idx); setEditForm({...item}); setShowNew(false);
  };
  const saveEdit = () => {
    updateListas(l=>({...l,catalogo:l.catalogo.map((x,i)=>i===editIdx?{...editForm}:x)}));
    setEditIdx(null); setEditForm(null); addToast('Item atualizado!','success');
  };

  return (
    <div>
      <div className="topbar">
        <h1 className="page-title">Catálogo de <span>Materiais</span></h1>
        <button className="btn btn-primary" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/>Novo Item</button>
      </div>
      {showNew && (
        <div className="table-wrap" style={{marginBottom:20,padding:20}}>
          <h3 style={{marginBottom:16}}>Novo Item no Catálogo</h3>
          <div className="form-grid">
            <div className="field"><label>Categoria</label><select value={form.Categoria} onChange={e=>setForm(v=>({...v,Categoria:e.target.value}))}><option value="">— Selecione —</option>{listas.categorias.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="field"><label>Descrição *</label><input value={form.Descricao} onChange={e=>setForm(v=>({...v,Descricao:e.target.value}))}/></div>
            <div className="field"><label>Especificação</label><input value={form.Especificacao} onChange={e=>setForm(v=>({...v,Especificacao:e.target.value}))}/></div>
            <div className="field"><label>Unidade</label><select value={form.Unidade} onChange={e=>setForm(v=>({...v,Unidade:e.target.value}))}>{listas.unidades.map(u=><option key={u}>{u}</option>)}</select></div>
            <div className="field"><label>Preço Médio (R$)</label><input type="number" step="0.01" value={form.Preco_Medio} onChange={e=>setForm(v=>({...v,Preco_Medio:+e.target.value}))}/></div>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-primary" onClick={saveItem}><Icon name="check" size={14}/>Salvar</button><button className="btn btn-secondary" onClick={()=>setShowNew(false)}>Cancelar</button></div>
          </div>
        </div>
      )}
      {/* Painel de edição de item do catálogo */}
      {editIdx!==null && editForm && (
        <div className="table-wrap" style={{marginBottom:20,padding:20,borderColor:'var(--accent)'}}>
          <h3 style={{marginBottom:16,color:'var(--accent)'}}>✏️ Editando: {listas.catalogo[editIdx]?.Descricao}</h3>
          <div className="form-grid">
            <div className="field"><label>Categoria</label><select value={editForm.Categoria} onChange={e=>setEditForm(v=>({...v,Categoria:e.target.value}))}><option value="">—</option>{listas.categorias.map(c=><option key={c}>{c}</option>)}</select></div>
            <div className="field"><label>Descrição</label><input value={editForm.Descricao} onChange={e=>setEditForm(v=>({...v,Descricao:e.target.value}))}/></div>
            <div className="field"><label>Especificação</label><input value={editForm.Especificacao||''} onChange={e=>setEditForm(v=>({...v,Especificacao:e.target.value}))}/></div>
            <div className="field"><label>Unidade</label><select value={editForm.Unidade} onChange={e=>setEditForm(v=>({...v,Unidade:e.target.value}))}>{listas.unidades.map(u=><option key={u}>{u}</option>)}</select></div>
            <div className="field"><label>Preço Médio (R$)</label><input type="number" step="0.01" value={editForm.Preco_Medio} onChange={e=>setEditForm(v=>({...v,Preco_Medio:+e.target.value}))}/></div>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-primary" onClick={saveEdit}><Icon name="check" size={14}/>Atualizar</button><button className="btn btn-secondary" onClick={()=>{setEditIdx(null);setEditForm(null);}}>Cancelar</button></div>
          </div>
        </div>
      )}
      <div className="filter-row">
        <div className="search-bar" style={{flex:1,maxWidth:280}}><Icon name="search" size={15}/><input placeholder="Buscar item..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
        <select value={catF} onChange={e=>setCatF(e.target.value)}><option value="">Todas as Categorias</option>{cats.map(c=><option key={c}>{c}</option>)}</select>
        <span style={{color:'var(--text3)',fontSize:12}}>{filtered.length} itens (ordem alfabética)</span>
      </div>
      <div className="table-wrap">
        <table>
          <thead><tr><th>Descrição ▲</th><th>Categoria</th><th>Especificação</th><th>Unidade</th><th>Preço Médio</th><th></th></tr></thead>
          <tbody>
            {filtered.map((c,i)=>(
              <tr key={i}>
                <td><strong>{c.Descricao}</strong></td>
                <td><span style={{fontSize:11,background:'var(--bg2)',padding:'2px 8px',borderRadius:4,color:'var(--text2)'}}>{c.Categoria}</span></td>
                <td style={{color:'var(--text3)',fontSize:12}}>{c.Especificacao}</td>
                <td>{c.Unidade}</td>
                <td><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{fmt(c.Preco_Medio)}</strong></td>
                <td>
                  <div style={{display:'flex',gap:3}}>
                    <button className="btn btn-secondary btn-icon btn-sm" title="Editar" onClick={()=>startEdit(c)}><Icon name="edit" size={13}/></button>
                    <button className="btn btn-danger btn-icon btn-sm" title="Excluir" onClick={()=>delItem(c.Descricao,c.Categoria)}><Icon name="trash" size={13}/></button>
                  </div>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ── USERS PAGE — B.1 com cadastro e recuperação de senha ─────────────────────
function UsersPage({ user, users, updateUsers, addToast }) {
  const [showAdd, setShowAdd] = useState(false);
  const [editUser, setEditUser] = useState(null);
  const [form, setForm] = useState({ username:'', name:'', email:'', password:'', role:'user' });
  const [errMsg, setErrMsg] = useState('');

  const isAdmin = user.role === 'admin';

  const saveUser = () => {
    if (!form.username || !form.name || !form.password) { setErrMsg('Preencha usuário, nome e senha.'); return; }
    if (users.length >= 10 && !editUser) { setErrMsg('Limite de 10 usuários atingido.'); return; }
    if (!editUser && users.find(x=>x.username===form.username)) { setErrMsg('Nome de usuário já existe.'); return; }
    if (editUser) {
      updateUsers(users.map(u=>u.id===editUser.id?{...u,...form}:u));
      addToast('Usuário atualizado!','success');
    } else {
      updateUsers([...users, {...form, id: Date.now()}]);
      addToast('Usuário cadastrado!','success');
    }
    setForm({ username:'', name:'', email:'', password:'', role:'user' });
    setShowAdd(false); setEditUser(null); setErrMsg('');
  };

  const delUser = (id) => {
    if (id===user.id) { addToast('Não é possível excluir o usuário atual.','error'); return; }
    if (!confirm('Excluir usuário?')) return;
    updateUsers(users.filter(u=>u.id!==id));
    addToast('Usuário removido.','info');
  };

  const startEdit = (u) => { setEditUser(u); setForm({username:u.username,name:u.name,email:u.email||'',password:u.password,role:u.role}); setShowAdd(true); setErrMsg(''); };

  return (
    <div>
      <div className="topbar">
        <h1 className="page-title">Gestão de <span>Usuários</span></h1>
        {isAdmin && <button className="btn btn-primary" onClick={()=>{setShowAdd(true);setEditUser(null);setForm({username:'',name:'',email:'',password:'',role:'user'});}}><Icon name="plus" size={15}/>Novo Usuário</button>}
      </div>

      {showAdd && isAdmin && (
        <div className="table-wrap" style={{marginBottom:20,padding:20}}>
          <h3 style={{marginBottom:16}}>{editUser ? 'Editar Usuário' : 'Novo Usuário'}</h3>
          {errMsg && <div className="err">{errMsg}</div>}
          <div className="form-grid">
            <div className="field"><label>Nome Completo *</label><input value={form.name} onChange={e=>setForm(v=>({...v,name:e.target.value}))}/></div>
            <div className="field"><label>Nome de Usuário *</label><input value={form.username} onChange={e=>setForm(v=>({...v,username:e.target.value}))} disabled={!!editUser}/></div>
            <div className="field"><label>E-mail</label><input type="email" value={form.email} onChange={e=>setForm(v=>({...v,email:e.target.value}))}/></div>
            <div className="field"><label>Senha *</label><input type="password" value={form.password} onChange={e=>setForm(v=>({...v,password:e.target.value}))}/></div>
            <div className="field"><label>Perfil</label>
              <select value={form.role} onChange={e=>setForm(v=>({...v,role:e.target.value}))}>
                <option value="user">Usuário</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
            <div style={{display:'flex',gap:8,alignItems:'flex-end'}}>
              <button className="btn btn-primary" onClick={saveUser}><Icon name="check" size={14}/>Salvar</button>
              <button className="btn btn-secondary" onClick={()=>{setShowAdd(false);setEditUser(null);setErrMsg('');}}>Cancelar</button>
            </div>
          </div>
        </div>
      )}

      <div className="table-wrap">
        <div className="table-header"><h3>Usuários Cadastrados ({users.length}/10)</h3></div>
        <table>
          <thead><tr><th>Nome</th><th>Usuário</th><th>E-mail</th><th>Perfil</th><th>Senha</th><th>Ações</th></tr></thead>
          <tbody>
            {users.map(u=>(
              <tr key={u.id}>
                <td><strong>{u.name}</strong></td>
                <td><span className="td-mono" style={{color:'var(--accent)'}}>{u.username}</span></td>
                <td style={{color:'var(--text2)',fontSize:12}}>{u.email||'—'}</td>
                <td><span className="badge" style={{background:u.role==='admin'?'rgba(245,166,35,0.2)':'rgba(74,144,217,0.2)',color:u.role==='admin'?'var(--accent)':'var(--blue)'}}>{u.role}</span></td>
                <td><code style={{background:'var(--bg2)',padding:'2px 8px',borderRadius:4,fontSize:12,color:'var(--text3)'}}>{u.password}</code></td>
                <td>
                  {isAdmin && (
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-sm btn-secondary btn-icon" title="Editar" onClick={()=>startEdit(u)}><Icon name="edit" size={13}/></button>
                      <button className="btn btn-sm btn-danger btn-icon" title="Excluir" onClick={()=>delUser(u.id)}><Icon name="trash" size={13}/></button>
                    </div>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
        <div style={{padding:16,borderTop:'1px solid var(--border)',color:'var(--text3)',fontSize:12}}>
          ℹ️ Recuperação de senha: na tela de login, clique em "Esqueci a senha" e informe o usuário ou e-mail. A senha será exibida (em produção seria enviada por SMTP). Apenas administradores podem cadastrar/editar usuários.
        </div>
      </div>
    </div>
  );
}

// ── RELATÓRIOS — A.2 ─────────────────────────────────────────────────────────
function ReportsPage({ projects, materials, maoDeObra, listas, addToast }) {
  const [reportTab, setReportTab] = useState('projetos');
  const [statusF, setStatusF] = useState('');
  const [clienteF, setClienteF] = useState('');
  const [locF, setLocF] = useState('');
  const [preview, setPreview] = useState(false);
  const [catSearchR, setCatSearchR] = useState('');
  const [catFilterR, setCatFilterR] = useState('');

  const clientes = [...new Set(projects.map(p=>p.Cliente).filter(Boolean))].sort();
  const localidades = [...new Set(projects.map(p=>p.Localidade).filter(Boolean))].sort();

  const filtered = projects.filter(p => {
    if (statusF && p.Status !== statusF) return false;
    if (clienteF && p.Cliente !== clienteF) return false;
    if (locF && p.Localidade !== locF) return false;
    return true;
  });

  const getMatTotal = (code) => materials.filter(m=>m.Codigo_Projeto===code).reduce((s,m)=>s+(m.Total||0),0);
  const getMOTotal = (code) => maoDeObra.filter(m=>m.Codigo_Projeto===code).reduce((s,m)=>s+(m.Total||0),0);

  const totalGeral = filtered.reduce((s,p)=>s+getMatTotal(p.Codigo)+getMOTotal(p.Codigo),0);
  const totalMat = filtered.reduce((s,p)=>s+getMatTotal(p.Codigo),0);
  const totalMO = filtered.reduce((s,p)=>s+getMOTotal(p.Codigo),0);

  // Exportar CSV (mantido para compatibilidade)
  const exportExcel = () => {
    const BOM = '\uFEFF';
    const header = ['Código','Nome do Projeto','Cliente','Responsável','Status','Localidade','Categoria','Data Início','Prazo','Mat./Serv. (R$)','Mão de Obra (R$)','Custo Total (R$)'];
    const rows = filtered.map(p => [
      p.Codigo, p.Nome_Projeto, p.Cliente, p.Responsavel, p.Status, p.Localidade, p.Categoria_Projeto,
      p.Data_Inicio, p.Data_Prev_Termino||'',
      getMatTotal(p.Codigo).toFixed(2).replace('.',','),
      getMOTotal(p.Codigo).toFixed(2).replace('.',','),
      (getMatTotal(p.Codigo)+getMOTotal(p.Codigo)).toFixed(2).replace('.',',')
    ]);
    const csv = BOM + [header, ...rows].map(r => r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(';')).join('\n');
    const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `JNM_Relatorio_${today()}.csv`;
    a.click();
    addToast('CSV exportado!','success');
  };

  // Exportar XLS real via SheetJS — relatório completo com 3 abas
  const exportXLS = () => {
    if (!window.XLSX) { addToast('Biblioteca XLSX não carregada. Verifique conexão.','error'); return; }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();

    // Aba 1 — Resumo de Projetos
    const projRows = [
      ['Código','Nome do Projeto','Cliente','Responsável','Status','Localidade','Categoria','Início','Prazo','Data Conclusão','Mat./Serv. (R$)','Mão de Obra (R$)','Custo Total (R$)','Objetivo','Observações']
    ];
    filtered.forEach(p => {
      const mat = getMatTotal(p.Codigo); const mo = getMOTotal(p.Codigo);
      projRows.push([p.Codigo,p.Nome_Projeto,p.Cliente,p.Responsavel||'',p.Status,p.Localidade||'',p.Categoria_Projeto||'',p.Data_Inicio||'',p.Data_Prev_Termino||'',p.Data_Real_Termino||'',mat,mo,mat+mo,p.Objetivo||'',p.Observacoes||'']);
    });
    // linha de total
    projRows.push(['','','','','','','','','','TOTAIS',totalMat,totalMO,totalGeral,'','']);
    const ws1 = XLSX.utils.aoa_to_sheet(projRows);
    // larguras de coluna
    ws1['!cols'] = [10,40,24,18,14,18,22,12,12,14,14,14,14,30,30].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws1, 'Projetos');

    // Aba 2 — Materiais e Serviços (apenas projetos filtrados)
    const codigos = new Set(filtered.map(p=>p.Codigo));
    const matRows = [['Código Projeto','Nome Projeto','Data','Categoria','Descrição','Especificação','Unidade','Quantidade','Valor Unit. (R$)','Total (R$)']];
    materials.filter(m=>codigos.has(m.Codigo_Projeto)).forEach(m=>{
      const proj = projects.find(p=>p.Codigo===m.Codigo_Projeto);
      matRows.push([m.Codigo_Projeto,proj?.Nome_Projeto||'',m.Data||'',m.Categoria||'',m.Descricao||'',m.Especificacao||'',m.Unidade||'',m.Quantidade,m.Valor_Unit,m.Total]);
    });
    const ws2 = XLSX.utils.aoa_to_sheet(matRows);
    ws2['!cols'] = [16,36,12,20,30,20,10,10,14,14].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws2, 'Materiais e Serviços');

    // Aba 3 — Mão de Obra
    const moRows = [['Código Projeto','Nome Projeto','Data','Função','Valor/Hora (R$)','Horas','Total (R$)']];
    maoDeObra.filter(m=>codigos.has(m.Codigo_Projeto)).forEach(m=>{
      const proj = projects.find(p=>p.Codigo===m.Codigo_Projeto);
      moRows.push([m.Codigo_Projeto,proj?.Nome_Projeto||'',m.Data||'',m.Funcao||'',m.Valor_Hora,m.Horas,m.Total]);
    });
    const ws3 = XLSX.utils.aoa_to_sheet(moRows);
    ws3['!cols'] = [16,36,12,14,14,10,14].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws3, 'Mão de Obra');

    XLSX.writeFile(wb, `JNM_Relatorio_Completo_${today()}.xlsx`);
    addToast('Relatório XLS exportado com sucesso!','success');
  };

  // Exportar PDF via janela de impressão
  const exportPDF = () => {
    const win = window.open('','_blank');
    const rows = filtered.map(p => {
      const mat = getMatTotal(p.Codigo); const mo = getMOTotal(p.Codigo);
      return `<tr>
        <td style="font-weight:600;color:#b06000">${p.Codigo}</td>
        <td>${p.Nome_Projeto}</td>
        <td>${p.Cliente}</td>
        <td>${p.Responsavel||''}</td>
        <td><span style="background:${p.Status==='Em andamento'?'#dbeafe':p.Status==='Concluido'?'#dcfce7':'#fef9c3'};color:${p.Status==='Em andamento'?'#1d4ed8':p.Status==='Concluido'?'#166534':'#854d0e'};padding:2px 8px;border-radius:999px;font-size:11px;font-weight:700">${p.Status}</span></td>
        <td>${p.Localidade||''}</td>
        <td style="text-align:right">${fmt(mat)}</td>
        <td style="text-align:right">${fmt(mo)}</td>
        <td style="text-align:right;font-weight:700;color:#b06000">${fmt(mat+mo)}</td>
      </tr>`;
    }).join('');
    win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">
    <title>JNM — Relatório de Projetos</title>
    <style>
      body{font-family:Arial,sans-serif;font-size:11px;color:#111;margin:24px}
      h1{font-size:20px;color:#b06000;margin-bottom:4px}
      .sub{color:#666;font-size:12px;margin-bottom:16px}
      table{width:100%;border-collapse:collapse;margin-top:12px}
      th{background:#1e2235;color:#fff;padding:7px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.05em}
      td{padding:7px 10px;border-bottom:1px solid #e5e7eb}
      tr:nth-child(even){background:#f9fafb}
      .totals{margin-top:16px;display:flex;gap:24px}
      .tot-box{background:#f3f4f6;border:1px solid #e5e7eb;border-radius:6px;padding:10px 16px;min-width:180px}
      .tot-label{font-size:10px;color:#666;text-transform:uppercase;letter-spacing:.05em}
      .tot-val{font-size:18px;font-weight:700;color:#b06000}
      @media print{body{margin:8px} .no-print{display:none}}
    </style></head><body>
    <h1>JNM Engenharia — Relatório de Projetos</h1>
    <div class="sub">Gerado em: ${new Date().toLocaleString('pt-BR')} | Filtros: Status=${statusF||'Todos'} | Cliente=${clienteF||'Todos'} | Localidade=${locF||'Todas'}</div>
    <button class="no-print" onclick="window.print()" style="background:#b06000;color:#fff;border:none;padding:8px 20px;border-radius:6px;cursor:pointer;font-size:13px;margin-bottom:8px">🖨️ Imprimir / Salvar PDF</button>
    <table>
      <thead><tr><th>Código</th><th>Projeto</th><th>Cliente</th><th>Responsável</th><th>Status</th><th>Localidade</th><th>Mat./Serv.</th><th>Mão de Obra</th><th>Total</th></tr></thead>
      <tbody>${rows}</tbody>
      <tfoot><tr style="background:#1e2235;color:#fff">
        <td colspan="6" style="padding:8px 10px;font-weight:700;text-align:right;color:#f5a623">TOTAIS (${filtered.length} projetos)</td>
        <td style="padding:8px 10px;font-weight:700;text-align:right;color:#86efac">${fmt(totalMat)}</td>
        <td style="padding:8px 10px;font-weight:700;text-align:right;color:#86efac">${fmt(totalMO)}</td>
        <td style="padding:8px 10px;font-weight:700;text-align:right;color:#f5a623">${fmt(totalGeral)}</td>
      </tr></tfoot>
    </table>
    <div class="totals">
      <div class="tot-box"><div class="tot-label">Projetos</div><div class="tot-val">${filtered.length}</div></div>
      <div class="tot-box"><div class="tot-label">Mat./Serviços</div><div class="tot-val">${fmt(totalMat)}</div></div>
      <div class="tot-box"><div class="tot-label">Mão de Obra</div><div class="tot-val">${fmt(totalMO)}</div></div>
      <div class="tot-box"><div class="tot-label">Custo Total Geral</div><div class="tot-val" style="font-size:22px">${fmt(totalGeral)}</div></div>
    </div>
    </body></html>`);
    win.document.close();
    addToast('Janela de PDF aberta — clique em Imprimir.','info');
  };

  // Exportar Catálogo XLS
  const exportCatalogXLS = () => {
    if (!window.XLSX) { addToast('Biblioteca XLSX não carregada.','error'); return; }
    const XLSX = window.XLSX;
    const wb = XLSX.utils.book_new();
    const catRows = [['Categoria','Descrição','Especificação','Unidade','Preço Médio (R$)']];
    const catData = listas && listas.catalogo ? [...listas.catalogo].sort((a,b)=>(a.Descricao||'').localeCompare(b.Descricao||'','pt-BR')) : [];
    catData.forEach(c => catRows.push([c.Categoria||'',c.Descricao||'',c.Especificacao||'',c.Unidade||'',c.Preco_Medio||0]));
    const ws = XLSX.utils.aoa_to_sheet(catRows);
    ws['!cols'] = [20,36,24,12,16].map(w=>({wch:w}));
    XLSX.utils.book_append_sheet(wb, ws, 'Catálogo de Materiais');
    XLSX.writeFile(wb, `JNM_Catalogo_${today()}.xlsx`);
    addToast('Catálogo exportado com sucesso!','success');
  };

  // Catálogo filtrado para exibição no relatório
  const catalogFiltered = (listas && listas.catalogo ? [...listas.catalogo] : [])
    .filter(c => (!catFilterR || c.Categoria === catFilterR) && (!catSearchR || (c.Descricao||'').toLowerCase().includes(catSearchR.toLowerCase())))
    .sort((a,b)=>(a.Descricao||'').localeCompare(b.Descricao||'','pt-BR'));
  const catalogCats = listas && listas.catalogo ? [...new Set(listas.catalogo.map(c=>c.Categoria))].sort() : [];

  return (
    <div>
      <div className="topbar">
        <h1 className="page-title">Relatórios <span>{reportTab==='catalogo'?'Catálogo':'de Projetos'}</span></h1>
        {reportTab==='projetos' && (
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-success" onClick={exportXLS}><Icon name="download" size={15}/>Exportar XLS (Completo)</button>
            <button className="btn btn-secondary" onClick={exportExcel}><Icon name="download" size={15}/>CSV</button>
            <button className="btn btn-secondary" onClick={exportPDF}><Icon name="report" size={15}/>PDF</button>
          </div>
        )}
        {reportTab==='catalogo' && (
          <button className="btn btn-success" onClick={exportCatalogXLS}><Icon name="download" size={15}/>Exportar Catálogo XLS</button>
        )}
      </div>

      {/* Tabs */}
      <div className="tabs" style={{marginBottom:20}}>
        <div className={`tab ${reportTab==='projetos'?'active':''}`} onClick={()=>setReportTab('projetos')}>Relatório de Projetos</div>
        <div className={`tab ${reportTab==='catalogo'?'active':''}`} onClick={()=>setReportTab('catalogo')}>Catálogo de Materiais</div>
      </div>

      {reportTab==='projetos' && (<>
      <div className="filter-row" style={{marginBottom:20}}>
        <Icon name="filter" size={14} style={{color:'var(--text3)'}}/>
        <select value={statusF} onChange={e=>setStatusF(e.target.value)}><option value="">Todos os Status</option>{['Planejamento','Em andamento','Concluido','Cancelado','Stand by'].map(s=><option key={s}>{s}</option>)}</select>
        <select value={clienteF} onChange={e=>setClienteF(e.target.value)}><option value="">Todos os Clientes</option>{clientes.map(c=><option key={c}>{c}</option>)}</select>
        <select value={locF} onChange={e=>setLocF(e.target.value)}><option value="">Todas as Localidades</option>{localidades.map(l=><option key={l}>{l}</option>)}</select>
        {(statusF||clienteF||locF) && <button className="btn btn-sm btn-secondary" onClick={()=>{setStatusF('');setClienteF('');setLocF('');}}>Limpar</button>}
      </div>

      <div className="stats-grid" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:20}}>
        <div className="stat-card orange"><div className="stat-label">Projetos Filtrados</div><div className="stat-value">{filtered.length}</div></div>
        <div className="stat-card blue"><div className="stat-label">Mat./Serviços</div><div className="stat-value" style={{fontSize:18}}>{fmt(totalMat)}</div></div>
        <div className="stat-card purple"><div className="stat-label">Mão de Obra</div><div className="stat-value" style={{fontSize:18}}>{fmt(totalMO)}</div></div>
        <div className="stat-card green"><div className="stat-label">Custo Total</div><div className="stat-value" style={{fontSize:18}}>{fmt(totalGeral)}</div></div>
      </div>

      <div className="table-wrap report-table">
        <div className="table-header"><h3>Dados dos Projetos</h3><span style={{color:'var(--text3)',fontSize:12}}>{filtered.length} projetos</span></div>
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Código</th><th>Projeto</th><th>Cliente</th><th>Responsável</th><th>Status</th><th>Localidade</th><th>Categoria</th><th>Início</th><th>Prazo</th><th>Mat./Serv.</th><th>Mão Obra</th><th>Total</th></tr></thead>
            <tbody>
              {filtered.length===0 && <tr><td colSpan={12}><div className="empty"><p>Nenhum projeto com esses filtros.</p></div></td></tr>}
              {filtered.map(p => {
                const mat = getMatTotal(p.Codigo); const mo = getMOTotal(p.Codigo);
                return (
                  <tr key={p.Codigo}>
                    <td><span style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13}}>{p.Codigo}</span></td>
                    <td style={{maxWidth:200}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:12}}>{p.Nome_Projeto}</div></td>
                    <td style={{fontSize:12}}>{p.Cliente}</td>
                    <td style={{fontSize:12}}>{p.Responsavel}</td>
                    <td><span className={getBadgeClass(p.Status)}>{p.Status}</span></td>
                    <td style={{fontSize:12}}>{p.Localidade}</td>
                    <td style={{fontSize:12}}>{p.Categoria_Projeto}</td>
                    <td style={{fontSize:12,color:'var(--text3)'}}>{fmtDate(p.Data_Inicio)}</td>
                    <td style={{fontSize:12,color: p.Data_Prev_Termino&&p.Status==='Em andamento'&&diffDays(today(),p.Data_Prev_Termino)<0?'var(--red)':'var(--text3)'}}>{fmtDate(p.Data_Prev_Termino)||'—'}</td>
                    <td style={{textAlign:'right',fontSize:12}}>{fmt(mat)}</td>
                    <td style={{textAlign:'right',fontSize:12}}>{fmt(mo)}</td>
                    <td style={{textAlign:'right'}}><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:14}}>{fmt(mat+mo)}</strong></td>
                  </tr>
                );
              })}
              {filtered.length>0 && <tr style={{background:'var(--bg2)'}}>
                <td colSpan={9} style={{textAlign:'right',fontWeight:700,color:'var(--text2)',fontSize:12}}>TOTAIS ({filtered.length} projetos)</td>
                <td style={{textAlign:'right'}}><strong style={{color:'var(--blue)',fontFamily:"'Barlow Condensed',sans-serif"}}>{fmt(totalMat)}</strong></td>
                <td style={{textAlign:'right'}}><strong style={{color:'var(--purple)',fontFamily:"'Barlow Condensed',sans-serif"}}>{fmt(totalMO)}</strong></td>
                <td style={{textAlign:'right'}}><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:16}}>{fmt(totalGeral)}</strong></td>
              </tr>}
            </tbody>
          </table>
        </div>
      </div>
      </>)}

      {reportTab==='catalogo' && (<>
        <div className="filter-row" style={{marginBottom:16}}>
          <div className="search-bar" style={{flex:1,maxWidth:280}}><Icon name="search" size={15}/><input placeholder="Buscar item..." value={catSearchR} onChange={e=>setCatSearchR(e.target.value)}/></div>
          <select style={{background:'var(--panel)',border:'1px solid var(--border)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:13,outline:'none'}} value={catFilterR} onChange={e=>setCatFilterR(e.target.value)}>
            <option value="">Todas as Categorias</option>{catalogCats.map(c=><option key={c}>{c}</option>)}
          </select>
          <span style={{color:'var(--text3)',fontSize:12}}>{catalogFiltered.length} itens</span>
        </div>
        <div className="table-wrap report-table">
          <div className="table-header"><h3>Catálogo de Materiais e Serviços</h3><span style={{color:'var(--text3)',fontSize:12}}>{catalogFiltered.length} itens</span></div>
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr><th>Descrição ▲</th><th>Categoria</th><th>Especificação</th><th>Unidade</th><th>Preço Médio</th></tr></thead>
              <tbody>
                {catalogFiltered.length===0 && <tr><td colSpan={5}><div className="empty"><p>Nenhum item encontrado.</p></div></td></tr>}
                {catalogFiltered.map((c,i) => (
                  <tr key={i}>
                    <td><strong>{c.Descricao}</strong></td>
                    <td><span style={{fontSize:11,background:'var(--bg2)',padding:'2px 8px',borderRadius:4,color:'var(--text2)'}}>{c.Categoria}</span></td>
                    <td style={{color:'var(--text3)',fontSize:12}}>{c.Especificacao}</td>
                    <td style={{fontSize:12}}>{c.Unidade}</td>
                    <td><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{fmt(c.Preco_Medio)}</strong></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      </>)}
    </div>
  );
}

// ── BACKUP PAGE — A.1 (indicador de salvamento) + D (importação ao abrir) ────
function BackupPage({ projects, materials, maoDeObra, listas, loadBackup, addToast }) {
  const fileRef = useRef();
  const lastSave = getLastSaveTime();

  const doExport = () => {
    const data = { version:'2.4', exportedAt: new Date().toISOString(), projects, materials, maoDeObra, listas };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `JNM_backup_${today()}.json`;
    a.click();
    addToast('Backup exportado!','success');
  };

  const doExportCSV = () => {
    const BOM = '\uFEFF';
    const header = ['Codigo','Nome_Projeto','Cliente','Responsavel','Status','Data_Inicio','Data_Prev_Termino','Localidade','Categoria_Projeto'];
    const rows = projects.map(p => header.map(h=>`"${(p[h]||'').toString().replace(/"/g,'""')}"`).join(';'));
    const blob = new Blob([BOM + [header.join(';'),...rows].join('\n')], {type:'text/csv;charset=utf-8;'});
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `JNM_projetos_${today()}.csv`; a.click();
    addToast('CSV exportado!','success');
  };

  const doImport = (e) => {
    const file = e.target.files[0]; if(!file)return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.projects || !data.materials) { addToast('Arquivo inválido.','error'); return; }
        loadBackup(data);
        addToast(`Importado: ${data.projects.length} projetos, ${data.materials.length} materiais.`,'success');
      } catch(err) { addToast('Erro ao importar: JSON inválido.','error'); }
    };
    reader.readAsText(file); e.target.value='';
  };

  return (
    <div>
      <div className="topbar"><h1 className="page-title">Backup & <span>Importação</span></h1></div>

      {/* A.1 — Indicador de último salvamento */}
      <div className="chart-card" style={{marginBottom:16,borderColor:'var(--green)',borderWidth:1}}>
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:'var(--green)',flexShrink:0}}/>
          <div>
            <div style={{fontWeight:700,fontSize:14,color:'var(--green)'}}>Dados sincronizados com Google Drive</div>
            <div style={{fontSize:12,color:'var(--text3)',marginTop:2}}>Último salvamento: <strong style={{color:'var(--text2)'}}>{fmtDateTime(lastSave)}</strong></div>
            <div style={{fontSize:11,color:'var(--text3)',marginTop:4}}>Auto-save ativo a cada 60 segundos. Use o botão "Salvar" no canto superior direito para salvar imediatamente. Exporte um backup JSON como cópia de segurança adicional.</div>
          </div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:20}}>
        <div className="chart-card">
          <h3>📥 Exportar Dados</h3>
          <p style={{color:'var(--text2)',fontSize:13,marginBottom:16,marginTop:8}}>Gera arquivo de backup completo (JSON) ou relatório de projetos (CSV/Excel).</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-primary" onClick={doExport}><Icon name="download" size={15}/>Exportar JSON (Backup Completo)</button>
            <button className="btn btn-secondary" onClick={doExportCSV}><Icon name="download" size={15}/>Exportar Projetos CSV</button>
          </div>
        </div>
        <div className="chart-card">
          <h3>📤 Importar Dados</h3>
          <p style={{color:'var(--text2)',fontSize:13,marginBottom:16,marginTop:8}}>Importe um backup JSON. <strong style={{color:'var(--yellow)'}}>Atenção: os dados atuais serão substituídos.</strong></p>
          <input type="file" ref={fileRef} accept=".json" style={{display:'none'}} onChange={doImport}/>
          <button className="btn btn-secondary" onClick={()=>fileRef.current.click()}><Icon name="upload" size={15}/>Selecionar arquivo JSON</button>
        </div>
      </div>

      {/* D.2 — Instruções Google Drive */}
      <div className="chart-card" style={{marginTop:16}}>
        <h3>☁️ Sincronização Google Drive</h3>
        <p style={{color:'var(--text2)',fontSize:13,marginTop:8,lineHeight:1.6}}>
          Os dados são salvos diretamente no seu <strong style={{color:'var(--accent)'}}>Google Drive</strong> em um arquivo chamado <code style={{background:'var(--bg2)',padding:'2px 6px',borderRadius:4}}>JNM_Gestao_Projetos_dados.json</code>.
          Todos os usuários autorizados compartilham o mesmo arquivo. O <strong>auto-save</strong> ocorre a cada 60 segundos automaticamente.
        </p>
        <div style={{marginTop:12,padding:12,background:'rgba(74,144,217,0.1)',border:'1px solid rgba(74,144,217,0.2)',borderRadius:'var(--radius)',fontSize:12,color:'var(--blue)'}}>
          💡 <strong>Multiusuário:</strong> O sistema detecta automaticamente se outro usuário salvou uma versão mais recente ao abrir o app. Use o botão <strong>"Salvar"</strong> no canto superior direito para salvar imediatamente no Drive.
        </div>
      </div>

      <div className="chart-card" style={{marginTop:16}}>
        <h3>📊 Resumo dos Dados Atuais</h3>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginTop:12}}>
          {[['Projetos',projects.length,'orange'],['Mat./Serviços',materials.length,'blue'],['Lançamentos MO',maoDeObra.length,'green'],['Itens Catálogo',listas.catalogo.length,'purple']].map(([label,val,color])=>(
            <div key={label} className={`stat-card ${color}`}><div className="stat-label">{label}</div><div className="stat-value">{val}</div></div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── EDIT PROJECT MODAL ───────────────────────────────────────────────────────
function EditProjectModal({ project, listas, onSave, onClose, user }) {
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-lg" onClick={e=>e.stopPropagation()}>
        <div className="modal-header">
          <h2>Editar Projeto</h2>
          <button className="btn btn-secondary btn-icon" onClick={onClose}><Icon name="x" size={16}/></button>
        </div>
        <div className="modal-body">
          <ProjectForm initial={project} listas={listas} onSave={onSave} onCancel={onClose} user={user}/>
        </div>
      </div>
    </div>
  );
}

// ── APP ───────────────────────────────────────────────────────────────────────
function App() {
  // Fase de inicialização: 'startup' | 'login' | 'app'
  const [phase, setPhase] = useState('startup');
  const [user, setUser] = useState(null);
  const [page, setPage] = useState('dashboard');
  const [detailCode, setDetailCode] = useState(null);
  const [editProject, setEditProject] = useState(null);
  const [toasts, setToasts] = useState([]);
  const [users, setUsers] = useState(() => loadUsers());

  // Estado Google Drive
  const [gdStatus, setGdStatus] = useState('offline'); // offline | saved | saving | error
  const [gdLastSave, setGdLastSave] = useState(getLastSaveTime());
  const gdCurrentUser = useRef(null); // nome do usuário logado para tag de save

  const [projects, setProjects]     = useState(SEED.projects);
  const [materials, setMaterials]   = useState(SEED.materials);
  const [maoDeObra, setMaoDeObra]   = useState(SEED.maoDeObra);
  const [listas, setListas]         = useState({
    categorias: SEED.categorias, funcoes: SEED.funcoes, status: SEED.status,
    unidades: SEED.unidades, localidades: SEED.localidades,
    categoriasProjeto: SEED.categoriasProjeto, catalogo: SEED.catalogo
  });

  // Referência para auto-save sem ficar criando closures velhos
  const dataRef = useRef({ projects, materials, maoDeObra, listas });
  useEffect(() => { dataRef.current = { projects, materials, maoDeObra, listas }; }, [projects, materials, maoDeObra, listas]);

  const addToast = (msg, type='info') => {
    const id = uid();
    setToasts(t=>[...t,{id,msg,type}]);
    setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),3500);
  };

  // ── Salva no Drive + localStorage ────────────────────────────────────────
  const performSave = async (dataOverride) => {
    const d = dataOverride || dataRef.current;
    // Sempre salva local como cache/offline fallback
    saveStore(d);
    setGdLastSave(new Date().toISOString());
    // Tenta salvar no Drive
    if (!_gdAccessToken) return;
    setGdStatus('saving');
    try {
      await gdSaveData({ ...d, _user: gdCurrentUser.current || 'usuário' });
      setGdStatus('saved');
    } catch(e) {
      setGdStatus('error');
      addToast('Falha ao salvar no Drive: ' + e.message, 'error');
    }
  };

  // ── Auto-save a cada 60s ──────────────────────────────────────────────────
  useEffect(() => {
    if (phase !== 'app') return;
    const iv = setInterval(() => performSave(), 60000);
    return () => clearInterval(iv);
  }, [phase]);

  // Salva localStorage a cada alteração de dados (fallback offline)
  useEffect(() => {
    if (phase !== 'app') return;
    saveStore({ projects, materials, maoDeObra, listas });
  }, [projects, materials, maoDeObra, listas, phase]);

  // Salva usuários separadamente
  useEffect(() => { saveUsers(users); }, [users]);

  // ── Callback do GDriveStartup ─────────────────────────────────────────────
  const handleDataLoaded = async (data, source) => {
    if (source === 'seed' || !data) {
      // Inicia com seed — não altera o estado atual (SEED já é o default)
    } else {
      // Aplica dados vindos do Drive ou backup
      setProjects(data.projects || []);
      setMaterials(data.materials || []);
      setMaoDeObra(data.maoDeObra || []);
      if (data.listas) setListas(data.listas);
      saveStore(data);
      if (data.savedAt) setGdLastSave(data.savedAt);
    }
    if (source === 'local') {
      // Usuário escolheu versão local — força um save imediato no Drive depois de setar
      setTimeout(() => performSave(), 500);
    }
    setGdStatus(source === 'seed' ? 'offline' : 'saved');
    setPhase('login');
  };

  const applyData = (data) => {
    setProjects(data.projects||[]);
    setMaterials(data.materials||[]);
    setMaoDeObra(data.maoDeObra||[]);
    if (data.listas) setListas(data.listas);
  };

  const handleLogin = (u) => {
    gdCurrentUser.current = u.name;
    setUser(u);
    setPhase('app');
    // Ao fazer login, verifica se há versão mais recente no Drive
    if (_gdAccessToken) {
      gdGetFileMeta().then(meta => {
        if (meta && meta.modifiedTime) {
          const localTime = getLastSaveTime();
          if (localTime && new Date(meta.modifiedTime) > new Date(localTime)) {
            addToast('⚠️ Há uma versão mais recente no Drive. Acesse Backup > Recarregar Drive para atualizar.', 'info');
          }
        }
      });
    }
  };

  const saveToFile = () => {
    const data = { version:'2.5', exportedAt: new Date().toISOString(), projects, materials, maoDeObra, listas };
    const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'JNM_backup_' + today() + '.json';
    a.click();
    addToast('Backup local salvo!','success');
  };

  const loadBackup = (data) => { applyData(data); };

  // ── Geração de código de projeto (inalterada) ─────────────────────────────
  const genCodCat = (nomeCategoria, listasCat) => {
    const catEntry = listasCat.find(c => c.nome === nomeCategoria);
    if (catEntry && catEntry.cod) return catEntry.cod;
    if (nomeCategoria) return nomeCategoria.replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,4).padEnd(4,'X');
    return 'PROJ';
  };

  const addProject = (form) => {
    setProjects(prev => {
      const loc = listas.localidades.find(l => l.nome === form.Localidade);
      const codLoc = (loc ? loc.cod : 'JNM.01').replace('JNM ','JNM.');
      const codCat = genCodCat(form.Categoria_Projeto, listas.categoriasProjeto);
      const nums = prev
        .filter(p => (p.Cod_Localidade || '').replace('JNM ','JNM.') === codLoc)
        .map(p => parseInt((p.Codigo || '').split('-')[1] || '0', 10))
        .filter(n => !isNaN(n) && n > 0);
      let next = nums.length ? Math.max.apply(null, nums) + 1 : 1;
      let code = codLoc + '-' + String(next).padStart(4,'0') + '-' + codCat;
      while (prev.some(p => p.Codigo === code)) {
        next++;
        code = codLoc + '-' + String(next).padStart(4,'0') + '-' + codCat;
      }
      const newProj = Object.assign({}, form, {
        Codigo: code,
        Data_Cadastro: today(),
        Cod_Localidade: codLoc,
        Cod_Categoria: codCat
      });
      return prev.concat([newProj]);
    });
  };

  const updateProject = (form) => {
    const oldCode = editProject ? editProject.Codigo : form.Codigo;
    const newCode = form.Codigo;
    if (newCode !== oldCode && projects.some(p => p.Codigo === newCode)) {
      addToast('Código "' + newCode + '" já está em uso!', 'error');
      return;
    }
    setProjects(p => p.map(x => x.Codigo === oldCode ? Object.assign({}, x, form, {Codigo: newCode}) : x));
    if (newCode !== oldCode) {
      setMaterials(m => m.map(x => x.Codigo_Projeto === oldCode ? Object.assign({}, x, {Codigo_Projeto: newCode}) : x));
      setMaoDeObra(m => m.map(x => x.Codigo_Projeto === oldCode ? Object.assign({}, x, {Codigo_Projeto: newCode}) : x));
      addToast('Projeto atualizado! Código: ' + oldCode + ' -> ' + newCode, 'success');
    } else {
      addToast('Projeto atualizado!', 'success');
    }
    setEditProject(null);
  };

  const deleteProject = (code) => {
    if (!confirm(`Excluir projeto ${code}?`)) return;
    setProjects(p=>p.filter(x=>x.Codigo!==code));
    setMaterials(m=>m.filter(x=>x.Codigo_Projeto!==code));
    setMaoDeObra(m=>m.filter(x=>x.Codigo_Projeto!==code));
    addToast('Projeto excluído.','info');
  };

  // ── Renderização por fase ─────────────────────────────────────────────────
  if (phase === 'startup') {
    return <GDriveStartup onDataLoaded={handleDataLoaded} onUseSeed={()=>handleDataLoaded(null,'seed')}/>;
  }

  if (phase === 'login' || !user) {
    return <Login onLogin={handleLogin} users={users}/>;
  }

  const renderPage = () => {
    switch(page) {
      case 'dashboard': return <Dashboard projects={projects} materials={materials} maoDeObra={maoDeObra} setPage={setPage} setDetailCode={setDetailCode}/>;
      case 'projects':
      case 'project-new':
        return <ProjectsList projects={projects} materials={materials} maoDeObra={maoDeObra} listas={listas} addProject={addProject} addToast={addToast} onView={(code)=>{setDetailCode(code);setPage('project-detail');}} onEdit={setEditProject} onDelete={deleteProject} user={user}/>;
      case 'project-detail':
        return <ProjectDetail code={detailCode} projects={projects} materials={materials} maoDeObra={maoDeObra} listas={listas} onBack={()=>setPage('projects')} onEdit={setEditProject} updateMaterials={setMaterials} updateMO={setMaoDeObra} addToast={addToast}/>;
      case 'database': return <DatabasePage listas={listas} updateListas={setListas} addToast={addToast}/>;
      case 'catalog': return <CatalogPage listas={listas} updateListas={setListas} addToast={addToast}/>;
      case 'users': return <UsersPage user={user} users={users} updateUsers={setUsers} addToast={addToast}/>;
      case 'reports': return <ReportsPage projects={projects} materials={materials} maoDeObra={maoDeObra} listas={listas} addToast={addToast}/>;
      case 'backup': return <BackupPage projects={projects} materials={materials} maoDeObra={maoDeObra} listas={listas} loadBackup={loadBackup} addToast={addToast}/>;
      default: return <Dashboard projects={projects} materials={materials} maoDeObra={maoDeObra} setPage={setPage} setDetailCode={setDetailCode}/>;
    }
  };

  return (
    <div className="app">
      <Sidebar page={page} setPage={setPage} user={user} onLogout={()=>{setUser(null);setPhase('login');}}/>
      <SaveIndicator
        gdStatus={gdStatus}
        lastSave={gdLastSave}
        onSaveGDrive={()=>performSave()}
        onBackupLocal={saveToFile}
      />
      <div className="main">{renderPage()}</div>
      {editProject && <EditProjectModal project={editProject} listas={listas} onSave={updateProject} onClose={()=>setEditProject(null)} user={user}/>}
      <ToastContainer toasts={toasts}/>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById('root'));
</script>
</body>
</html>

<style>
:root {
  --bg: #0d0f14;
  --bg2: #141720;
  --bg3: #1c2030;
  --panel: #1e2235;
  --border: #2a2f45;
  --accent: #f5a623;
  --accent2: #e8830c;
  --blue: #4a90d9;
  --green: #27ae60;
  --red: #e74c3c;
  --yellow: #f39c12;
  --purple: #8e44ad;
  --text: #e8eaf0;
  --text2: #a0a8c0;
  --text3: #606880;
  --radius: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Barlow', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
h1,h2,h3,h4 { font-family: 'Barlow Condensed', sans-serif; letter-spacing: 0.02em; }
button { cursor: pointer; border: none; font-family: 'Barlow', sans-serif; }
input, select, textarea { font-family: 'Barlow', sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* LOGIN */
.login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--bg); position: relative; overflow: hidden; }
.login-bg { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(245,166,35,0.08) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(74,144,217,0.06) 0%, transparent 50%); }
.login-box { position: relative; z-index: 1; background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 48px 40px; width: 380px; box-shadow: 0 24px 64px rgba(0,0,0,0.6); }
.login-logo { text-align: center; margin-bottom: 32px; }
.login-logo span { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 36px; color: var(--accent); letter-spacing: 0.05em; }
.login-logo p { color: var(--text2); font-size: 13px; margin-top: 4px; letter-spacing: 0.1em; text-transform: uppercase; }
.login-box h2 { font-size: 20px; font-weight: 600; margin-bottom: 24px; color: var(--text2); }
.field { margin-bottom: 16px; }
.field label { display: block; font-size: 12px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.field input, .field select, .field textarea { width: 100%; background: var(--bg2); border: 1px solid var(--border); color: var(--text); padding: 10px 14px; border-radius: var(--radius); font-size: 14px; transition: border-color .2s; outline: none; }
.field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
.field select option { background: var(--bg2); }
.field textarea { resize: vertical; min-height: 80px; }
.err { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #f07070; border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }
.info-box { background: rgba(74,144,217,0.1); border: 1px solid rgba(74,144,217,0.3); color: #7ab8e8; border-radius: var(--radius); padding: 10px 14px; font-size: 13px; margin-bottom: 16px; }

/* GOOGLE DRIVE STARTUP */
.startup-overlay { position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center; }
.startup-box { background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:460px;max-width:95vw;box-shadow:0 24px 64px rgba(0,0,0,0.6); }
.startup-box h2 { font-size:20px;font-weight:700;margin-bottom:8px; }
.gdrive-btn { display:flex;align-items:center;gap:10px;background:#fff;color:#3c4043;border:1px solid #dadce0;border-radius:8px;padding:12px 20px;font-size:14px;font-weight:600;font-family:'Barlow',sans-serif;cursor:pointer;width:100%;justify-content:center;margin-bottom:10px;transition:box-shadow .2s; }
.gdrive-btn:hover { box-shadow:0 2px 8px rgba(0,0,0,0.3); }
.gdrive-btn svg { flex-shrink:0; }
.gdrive-status { display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(39,174,96,0.1);border:1px solid rgba(39,174,96,0.3);border-radius:8px;margin-bottom:12px;font-size:13px;color:var(--green); }
.gdrive-warn { display:flex;align-items:center;gap:8px;padding:10px 14px;background:rgba(243,156,18,0.1);border:1px solid rgba(243,156,18,0.3);border-radius:8px;margin-bottom:12px;font-size:13px;color:var(--yellow); }
.gdrive-indicator { display:flex;align-items:center;gap:6px;font-size:11px;color:var(--text3); }
.gdrive-indicator .dot-drive { width:8px;height:8px;border-radius:50%;background:var(--green);flex-shrink:0; }
.gdrive-indicator .dot-drive.saving { background:var(--yellow);animation:pulse 1s infinite; }
.gdrive-indicator .dot-drive.error { background:var(--red); }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 600; transition: all .2s; white-space: nowrap; }
.btn-primary { background: var(--accent); color: #0d0f14; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
.btn-danger { background: rgba(231,76,60,0.15); color: #e74c3c; border: 1px solid rgba(231,76,60,0.3); }
.btn-danger:hover { background: rgba(231,76,60,0.3); }
.btn-success { background: rgba(39,174,96,0.15); color: #27ae60; border: 1px solid rgba(39,174,96,0.3); }
.btn-success:hover { background: rgba(39,174,96,0.3); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-full { width: 100%; justify-content: center; }
.btn-icon { padding: 6px 10px; }

/* LAYOUT */
.app { display: flex; min-height: 100vh; }
.sidebar { width: 220px; flex-shrink: 0; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; z-index: 100; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid var(--border); }
.sidebar-logo .brand { font-family: 'Barlow Condensed', sans-serif; font-weight: 800; font-size: 26px; color: var(--accent); }
.sidebar-logo .sub { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.sidebar-nav { flex: 1; padding: 12px 0; overflow-y: auto; }
.nav-section { padding: 12px 16px 4px; font-size: 10px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.1em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 16px; color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; transition: all .2s; border-left: 3px solid transparent; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(245,166,35,0.1); color: var(--accent); border-left-color: var(--accent); }
.nav-item svg { width: 18px; height: 18px; flex-shrink: 0; }
.sidebar-footer { padding: 16px; border-top: 1px solid var(--border); }
.user-info { display: flex; align-items: center; gap: 10px; }
.user-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 14px; color: #0d0f14; flex-shrink: 0; }
.user-name { font-size: 13px; font-weight: 600; color: var(--text); }
.user-role { font-size: 11px; color: var(--text3); }
.main { margin-left: 220px; flex: 1; padding: 28px 32px; min-height: 100vh; }

/* SAVE INDICATOR - canto superior direito */
.save-indicator { position: fixed; top: 12px; right: 16px; z-index: 200; background: var(--bg2); border: 1px solid var(--border); border-radius: 20px; padding: 5px 12px; display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--text3); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.save-indicator .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); flex-shrink: 0; }
.save-indicator .dot.unsaved { background: var(--yellow); animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* TOPBAR */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 30px; font-weight: 700; color: var(--text); }
.page-title span { color: var(--accent); }
.search-bar { display: flex; align-items: center; gap: 8px; background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px 14px; min-width: 260px; }
.search-bar input { background: none; border: none; color: var(--text); font-size: 14px; outline: none; width: 100%; }
.search-bar svg { color: var(--text3); flex-shrink: 0; }

/* CARDS / STATS */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; overflow: hidden; }
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
.stat-card.orange::before { background: var(--accent); }
.stat-card.blue::before { background: var(--blue); }
.stat-card.green::before { background: var(--green); }
.stat-card.red::before { background: var(--red); }
.stat-card.yellow::before { background: var(--yellow); }
.stat-card.purple::before { background: var(--purple); }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.stat-value { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; font-weight: 700; color: var(--text); }
.stat-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* TABLE */
.table-wrap { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.table-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); }
.table-header h3 { font-size: 16px; font-weight: 700; }
.table-actions { display: flex; gap: 8px; align-items: center; }
table { width: 100%; border-collapse: collapse; }
thead th { padding: 12px 16px; text-align: left; font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; border-bottom: 1px solid var(--border); background: var(--bg2); white-space: nowrap; }
tbody tr { border-bottom: 1px solid var(--border); transition: background .15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: var(--bg3); }
tbody td { padding: 12px 16px; font-size: 13px; color: var(--text); }
.td-mono { font-family: 'Barlow Condensed', sans-serif; font-weight: 600; font-size: 14px; }

/* BADGES */
.badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; white-space: nowrap; }
.badge-andamento { background: rgba(74,144,217,0.2); color: var(--blue); }
.badge-concluido { background: rgba(39,174,96,0.2); color: var(--green); }
.badge-standby { background: rgba(243,156,18,0.2); color: var(--yellow); }
.badge-cancelado { background: rgba(231,76,60,0.2); color: var(--red); }
.badge-planejamento { background: rgba(142,68,173,0.2); color: var(--purple); }
.badge-atraso { background: rgba(231,76,60,0.15); color: #ff6b6b; border: 1px solid rgba(231,76,60,0.3); }

/* MODAL */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
.modal { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 720px; max-height: 90vh; display: flex; flex-direction: column; box-shadow: var(--shadow); }
.modal-lg { max-width: 900px; }
.modal-xl { max-width: 1100px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 20px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
.modal-header h2 { font-size: 20px; font-weight: 700; }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-footer { padding: 16px 24px; border-top: 1px solid var(--border); display: flex; gap: 8px; justify-content: flex-end; flex-shrink: 0; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.form-grid .span2 { grid-column: span 2; }

/* CHARTS */
.charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: var(--text2); }
.bar-chart { display: flex; flex-direction: column; gap: 10px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label { font-size: 12px; color: var(--text2); min-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.bar-track { flex: 1; background: var(--bg2); border-radius: 3px; height: 10px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.bar-val { font-size: 12px; color: var(--text3); min-width: 72px; text-align: right; font-family: 'Barlow Condensed', sans-serif; }

/* DONUT */
.donut-wrap { display: flex; align-items: center; gap: 20px; }
.donut-svg { flex-shrink: 0; }
.donut-legend { display: flex; flex-direction: column; gap: 8px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 13px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ALERTS */
.alert-list { display: flex; flex-direction: column; gap: 8px; }
.alert-item { display: flex; align-items: center; gap: 12px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 16px; border-left: 3px solid var(--red); }
.alert-item.warn { border-left-color: var(--yellow); }
.alert-content { flex: 1; }
.alert-title { font-size: 13px; font-weight: 600; }
.alert-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }

/* TABS */
.tabs { display: flex; gap: 2px; background: var(--bg2); border-radius: var(--radius); padding: 4px; margin-bottom: 20px; width: fit-content; }
.tab { padding: 8px 20px; border-radius: 6px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; transition: all .2s; }
.tab.active { background: var(--panel); color: var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

/* PROJECT DETAIL */
.proj-detail-header { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; margin-bottom: 20px; }
.proj-code { font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; }
.proj-name { font-size: 24px; font-weight: 700; margin: 4px 0; }
.proj-meta { display: flex; gap: 24px; flex-wrap: wrap; margin-top: 12px; }
.proj-meta-item { font-size: 13px; color: var(--text2); }
.proj-meta-item strong { color: var(--text); }
.cost-summary { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-top: 16px; }
.cost-box { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
.cost-box-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
.cost-box-value { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); margin-top: 4px; }

/* EMPTY */
.empty { text-align: center; padding: 48px 24px; color: var(--text3); }
.empty p { font-size: 14px; }

/* FILTER ROW */
.filter-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-bottom: 16px; }
.filter-row select, .filter-row input { background: var(--panel); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: var(--radius); font-size: 13px; outline: none; }
.filter-row select:focus, .filter-row input:focus { border-color: var(--accent); }

/* TOAST */
.toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 20px; font-size: 14px; box-shadow: var(--shadow); pointer-events: all; display: flex; align-items: center; gap: 10px; min-width: 240px; animation: slideIn .3s ease; }
.toast.success { border-left: 3px solid var(--green); }
.toast.error { border-left: 3px solid var(--red); }
.toast.info { border-left: 3px solid var(--blue); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* REPORT TABLE */
.report-table table { font-size: 12px; }
.report-table thead th { font-size: 10px; padding: 8px 10px; }
.report-table tbody td { padding: 8px 10px; }

/* RESPONSIVE */
@media (max-width: 1200px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
@media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } .form-grid { grid-template-columns: 1fr; } .form-grid .span2 { grid-column: span 1; } }
</style>

const GD_CLIENT_ID  = '574279171972-h0ue2kf0c4c6hpe7je81r95iifb3bvtl.apps.googleusercontent.com';
const GD_API_KEY    = 'AIzaSyCrBVWE6n3-Y4JwDo9DxhYnMCqkrIlZxeM';
const GD_SCOPE      = 'https://www.googleapis.com/auth/drive.file';
const GD_FILE_NAME  = 'JNM_Gestao_Projetos_dados.json';

// Estado global do Drive (não React — evita re-renders desnecessários)
let _gdTokenClient = null;
let _gdAccessToken = null;
let _gdFileId = null;
let _gdReady = false;
let _gdInitCallback = null;

function gdGetStoredFileId() {
  try { return localStorage.getItem(GD_FILE_KEY) || null; } catch(e) { return null; }
}
function gdSetStoredFileId(id) {
  try { if(id) localStorage.setItem(GD_FILE_KEY, id); else localStorage.removeItem(GD_FILE_KEY); } catch(e) {}
}

// Carrega gapi + inicia tokenClient
async function gdInit(onReady) {
  _gdInitCallback = onReady;
  _gdFileId = gdGetStoredFileId();

  return new Promise((resolve) => {
    const waitGsi = setInterval(() => {
      if (window.google && window.google.accounts && window.gapi) {
        clearInterval(waitGsi);
        window.gapi.load('client', async () => {
          try {
            await window.gapi.client.init({ apiKey: GD_API_KEY, discoveryDocs: ['https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'] });
          } catch(e) {}
          _gdTokenClient = window.google.accounts.oauth2.initTokenClient({
            client_id: GD_CLIENT_ID,
            scope: GD_SCOPE,
            callback: (resp) => {
              if (resp.access_token) {
                _gdAccessToken = resp.access_token;
                _gdReady = true;
                if (_gdInitCallback) _gdInitCallback(true);
              } else {
                if (_gdInitCallback) _gdInitCallback(false);
              }
            }
          });
          _gdReady = false;
          resolve();
        });
      }
    }, 200);
  });
}

function gdRequestAccess(callback) {
  _gdInitCallback = callback;
  if (_gdTokenClient) {
    _gdTokenClient.requestAccessToken({ prompt: '' });
  }
}

// Busca o arquivo pelo nome ou usa o ID salvo
async function gdFindOrCreateFile(data) {
  if (!_gdAccessToken) throw new Error('Não autenticado');
  // Se já temos ID salvo, usa direto
  if (_gdFileId) return _gdFileId;
  // Busca pelo nome
  const q = encodeURIComponent(`name='${GD_FILE_NAME}' and trashed=false`);
  const res = await fetch(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name,modifiedTime)`, {
    headers: { Authorization: 'Bearer ' + _gdAccessToken }
  });
  const json = await res.json();
  if (json.files && json.files.length > 0) {
    _gdFileId = json.files[0].id;
    gdSetStoredFileId(_gdFileId);
    return _gdFileId;
  }
  // Cria novo arquivo
  const meta = { name: GD_FILE_NAME, mimeType: 'application/json' };
  const body = JSON.stringify(data || {});
  const form = new FormData();
  form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
  form.append('file', new Blob([body], {type:'application/json'}));
  const cr = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id', {
    method: 'POST',
    headers: { Authorization: 'Bearer ' + _gdAccessToken },
    body: form
  });
  const cj = await cr.json();
  _gdFileId = cj.id;
  gdSetStoredFileId(_gdFileId);
  return _gdFileId;
}

// Lê dados do arquivo do Drive
async function gdLoadData() {
  if (!_gdAccessToken) throw new Error('Não autenticado');
  const fileId = await gdFindOrCreateFile(null);
  if (!fileId) throw new Error('Arquivo não encontrado');
  const res = await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`, {
    headers: { Authorization: 'Bearer ' + _gdAccessToken }
  });
  if (!res.ok) throw new Error('Erro ao ler arquivo do Drive');
  const text = await res.text();
  if (!text || text.trim() === '') return null;
  return JSON.parse(text);
}

// Salva dados no Drive (atualiza o arquivo existente)
async function gdSaveData(data) {
  if (!_gdAccessToken) throw new Error('Não autenticado');
  const fileId = await gdFindOrCreateFile(data);
  const body = JSON.stringify({ ...data, savedAt: new Date().toISOString(), savedBy: data._user || 'sistema' });
  const res = await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, {
    method: 'PATCH',
    headers: { Authorization: 'Bearer ' + _gdAccessToken, 'Content-Type': 'application/json' },
    body
  });
  if (!res.ok) throw new Error('Erro ao salvar no Drive');
  return true;
}

// Verifica metadados do arquivo (para detectar conflito de versão)
async function gdGetFileMeta() {
  if (!_gdAccessToken || !_gdFileId) return null;
  try {
    const res = await fetch(`https://www.googleapis.com/drive/v3/files/${_gdFileId}?fields=modifiedTime,lastModifyingUser`, {
      headers: { Authorization: 'Bearer ' + _gdAccessToken }
    });
    return await res.json();
  } catch(e) { return null; }
}

// ── GOOGLE DRIVE STARTUP SCREEN ───────────────────────────────────────────────
function GDriveStartup({ onDataLoaded, onUseSeed }) {
  const [phase, setPhase] = useState('init'); // init | connecting | connected | loading | conflict | error
  const [gdUser, setGdUser] = useState(null);
  const [conflictInfo, setConflictInfo] = useState(null);
  const [driveData, setDriveData] = useState(null);
  const [errMsg, setErrMsg] = useState('');
  const [loadingMsg, setLoadingMsg] = useState('');
  const fileRef = useRef();

  useEffect(() => {
    gdInit(() => {}).then(() => setPhase('ready'));
  }, []);

  const handleConnect = () => {
    setPhase('connecting');
    setErrMsg('');
    gdRequestAccess(async (ok) => {
      if (!ok) { setPhase('ready'); setErrMsg('Acesso negado ou cancelado.'); return; }
      // Pega info do usuário
      try {
        const info = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
          headers: { Authorization: 'Bearer ' + _gdAccessToken }
        });
        const u = await info.json();
        setGdUser(u);
      } catch(e) {}
      setPhase('connected');
    });
  };

  const handleLoadDrive = async () => {
    setPhase('loading');
    setLoadingMsg('Buscando dados no Google Drive...');
    try {
      const data = await gdLoadData();
      if (!data || !data.projects) {
        // Arquivo vazio ou novo — pergunta se usa seed
        setDriveData(null);
        setPhase('empty');
        return;
      }
      // Verifica se há dados locais mais recentes (conflito)
      const localTime = getLastSaveTime();
      const driveTime = data.savedAt;
      if (localTime && driveTime && new Date(localTime) > new Date(driveTime)) {
        setConflictInfo({ localTime, driveTime, driveUser: data.savedBy });
        setDriveData(data);
        setPhase('conflict');
        return;
      }
      onDataLoaded(data, 'drive');
    } catch(e) {
      setErrMsg('Erro ao carregar dados: ' + e.message);
      setPhase('connected');
    }
  };

  const handleUseBackup = (e) => {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!data.projects) { setErrMsg('Arquivo inválido.'); return; }
        onDataLoaded(data, 'backup');
      } catch(err) { setErrMsg('Erro ao ler arquivo JSON.'); }
    };
    reader.readAsText(file);
    e.target.value = '';
  };

  const GoogleIcon = () => (
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
  );

  const DriveIcon = () => (
    <svg width="20" height="20" viewBox="0 0 87.3 78">
      <path fill="#0066da" d="M6.6 66.85l3.85 6.65c.8 1.4 1.95 2.5 3.3 3.3L28.1 53H0c0 1.55.4 3.1 1.2 4.5z"/>
      <path fill="#00ac47" d="M43.65 25L29.35 0c-1.35.8-2.5 1.9-3.3 3.3L1.2 48.5c-.8 1.4-1.2 2.95-1.2 4.5h28.1z"/>
      <path fill="#ea4335" d="M73.55 76.8c1.35-.8 2.5-1.9 3.3-3.3l1.6-2.75L86.1 57c.8-1.4 1.2-2.95 1.2-4.5H59.2l6 14.5z"/>
      <path fill="#00832d" d="M43.65 25L57.95 0H29.35z"/>
      <path fill="#2684fc" d="M59.2 52.5H28.1L13.8 76.8h59.7z"/>
      <path fill="#ffba00" d="M86.1 57l-14.3-24.85c-.8-1.4-1.95-2.5-3.3-3.3L57.95 25 43.65 49.5l15.55 3 14.3 0z"/>
    </svg>
  );

  return (
    <div className="startup-overlay">
      <div className="startup-box">
        <div style={{marginBottom:24,textAlign:'center'}}>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:34,color:'var(--accent)'}}>JNM</span>
          <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,color:'var(--text2)',marginLeft:10}}>Gestão de Projetos</span>
          <div style={{fontSize:11,color:'var(--text3)',marginTop:4,textTransform:'uppercase',letterSpacing:'0.1em'}}>v2.5 — Cloud Edition</div>
        </div>

        {/* Fase: não conectado */}
        {(phase === 'init' || phase === 'ready') && (
          <>
            <h2 style={{marginBottom:8}}>Conectar ao Google Drive</h2>
            <p style={{color:'var(--text2)',fontSize:13,marginBottom:20,lineHeight:1.5}}>
              Os dados são armazenados diretamente no seu Google Drive, compartilhados entre todos os usuários em tempo real.
            </p>
            {errMsg && <div className="err">{errMsg}</div>}
            <button className="gdrive-btn" onClick={handleConnect} disabled={phase==='init'}>
              <GoogleIcon/> {phase==='init' ? 'Carregando...' : 'Entrar com Google'}
            </button>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:16,marginTop:8}}>
              <p style={{color:'var(--text3)',fontSize:12,marginBottom:10}}>Ou carregar um backup local (.json):</p>
              <input type="file" ref={fileRef} accept=".json" style={{display:'none'}} onChange={handleUseBackup}/>
              <button className="btn btn-secondary btn-full" style={{fontSize:13}} onClick={()=>fileRef.current.click()}>
                <Icon name="upload" size={14}/>Carregar Backup JSON
              </button>
            </div>
          </>
        )}

        {/* Fase: conectando */}
        {phase === 'connecting' && (
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:14,color:'var(--text2)',marginBottom:8}}>Aguardando autorização Google...</div>
            <div style={{fontSize:12,color:'var(--text3)'}}>Uma janela pop-up deve ter aberto. Faça login com sua conta Google.</div>
          </div>
        )}

        {/* Fase: conectado — pronto para carregar */}
        {phase === 'connected' && (
          <>
            {gdUser && (
              <div className="gdrive-status">
                <GoogleIcon/>
                <span>Conectado como <strong>{gdUser.name || gdUser.email}</strong></span>
              </div>
            )}
            {errMsg && <div className="err">{errMsg}</div>}
            <button className="btn btn-primary btn-full" style={{marginBottom:12,fontSize:14,padding:'12px 20px'}} onClick={handleLoadDrive}>
              <DriveIcon style={{marginRight:4}}/> Abrir dados do Google Drive
            </button>
            <button className="btn btn-secondary btn-full" style={{fontSize:13}} onClick={()=>setPhase('ready')}>
              <Icon name="back" size={14}/>Trocar conta Google
            </button>
          </>
        )}

        {/* Fase: carregando */}
        {phase === 'loading' && (
          <div style={{textAlign:'center',padding:'20px 0'}}>
            <div style={{fontSize:14,color:'var(--accent)',marginBottom:8,fontWeight:600}}>{loadingMsg || 'Carregando do Google Drive...'}</div>
            <div style={{fontSize:12,color:'var(--text3)'}}>Aguarde...</div>
          </div>
        )}

        {/* Fase: arquivo vazio/novo no Drive */}
        {phase === 'empty' && (
          <>
            <div className="gdrive-warn">
              <Icon name="alert" size={16}/>
              <span>Nenhum dado encontrado no Drive. Iniciar novo banco de dados?</span>
            </div>
            <button className="btn btn-primary btn-full" style={{marginBottom:10}} onClick={()=>onDataLoaded(null,'seed')}>
              <Icon name="database" size={14}/>Iniciar com dados padrão
            </button>
            <div style={{borderTop:'1px solid var(--border)',paddingTop:12,marginTop:4}}>
              <p style={{color:'var(--text3)',fontSize:12,marginBottom:10}}>Ou restaurar um backup existente:</p>
              <input type="file" ref={fileRef} accept=".json" style={{display:'none'}} onChange={handleUseBackup}/>
              <button className="btn btn-secondary btn-full" style={{fontSize:13}} onClick={()=>fileRef.current.click()}>
                <Icon name="upload" size={14}/>Carregar Backup JSON
              </button>
            </div>
          </>
        )}

        {/* Fase: conflito de versão */}
        {phase === 'conflict' && conflictInfo && (
          <>
            <div className="gdrive-warn">
              <Icon name="alert" size={16}/>
              <div>
                <strong>Atenção: versão local mais recente detectada</strong><br/>
                <span style={{fontSize:12}}>
                  Seu navegador tem dados de <strong>{fmtDateTime(conflictInfo.localTime)}</strong> (mais recente)<br/>
                  O Drive tem dados de <strong>{fmtDateTime(conflictInfo.driveTime)}</strong>
                  {conflictInfo.driveUser ? ` (salvo por ${conflictInfo.driveUser})` : ''}
                </span>
              </div>
            </div>
            <p style={{color:'var(--text2)',fontSize:13,marginBottom:14}}>Qual versão deseja usar?</p>
            <button className="btn btn-primary btn-full" style={{marginBottom:10}} onClick={()=>onDataLoaded(driveData,'drive')}>
              <Icon name="download" size={14}/>Usar versão do Drive ({fmtDateTime(conflictInfo.driveTime)})
            </button>
            <button className="btn btn-secondary btn-full" onClick={()=>onDataLoaded(loadStore(),'local')}>
              <Icon name="refresh" size={14}/>Usar minha versão local ({fmtDateTime(conflictInfo.localTime)})
            </button>
          </>
        )}

        {/* Rodapé */}
        <p style={{marginTop:20,fontSize:11,color:'var(--text3)',textAlign:'center',borderTop:'1px solid var(--border)',paddingTop:12}}>
          🔒 Dados salvos em arquivo privado no seu Google Drive. Auto-save a cada 60 segundos.
        </p>
      </div>
    </div>
  );
}

// ── LOGIN ────────────────────────────────────────────────────────────────────
function Login({ onLogin, users }) {
  const [u, setU] = useState('');
  const [p, setP] = useState('');
  const [err, setErr] = useState('');
  const [mode, setMode] = useState('login'); // login | forgot | register
  const [forgotUser, setForgotUser] = useState('');
  const [forgotMsg, setForgotMsg] = useState('');
  const [regForm, setRegForm] = useState({ username:'', name:'', email:'', password:'', confirm:'' });
  const [regMsg, setRegMsg] = useState('');

  const submit = () => {
    const user = users.find(x => x.username === u && x.password === p);
    if (user) onLogin(user);
    else setErr('Usuário ou senha incorretos.');
  };

  const handleForgot = () => {
    const user = users.find(x => x.username === forgotUser || x.email === forgotUser);
    if (!user) { setForgotMsg('Usuário não encontrado.'); return; }
    // Simula envio de e-mail — em produção integraria com API de e-mail
    setForgotMsg(`✅ Simulação: A senha "${user.password}" seria enviada para ${user.email || 'e-mail não cadastrado'}. (Em produção, use servidor SMTP)`);
  };

  const handleRegister = () => {
    if (!regForm.username || !regForm.name || !regForm.password) { setRegMsg('Preencha todos os campos obrigatórios.'); return; }
    if (regForm.password !== regForm.confirm) { setRegMsg('As senhas não coincidem.'); return; }
    if (users.length >= 10) { setRegMsg('Limite de 10 usuários atingido.'); return; }
    if (users.find(x => x.username === regForm.username)) { setRegMsg('Nome de usuário já existe.'); return; }
    // Seria registrado pelo admin — aqui mostra mensagem
    setRegMsg(`✅ Solicitação de cadastro para "${regForm.name}" (${regForm.username}) registrada. Aguarde aprovação do administrador ou peça ao admin para adicionar via painel de Usuários.`);
  };

  if (mode === 'forgot') return (
    <div className="login-wrap">
      <div className="login-bg"/>
      <div className="login-box">
        <div className="login-logo"><span>JNM</span><p>Engenharia Industrial</p></div>
        <h2>Recuperar Senha</h2>
        <p style={{color:'var(--text2)',fontSize:13,marginBottom:16}}>Informe seu usuário ou e-mail cadastrado.</p>
        {forgotMsg && <div className={forgotMsg.startsWith('✅') ? 'info-box' : 'err'}>{forgotMsg}</div>}
        <div className="field"><label>Usuário ou E-mail</label><input value={forgotUser} onChange={e=>setForgotUser(e.target.value)} autoFocus/></div>
        <button className="btn btn-primary btn-full" style={{marginBottom:10}} onClick={handleForgot}><Icon name="mail" size={15}/>Enviar Senha por E-mail</button>
        <button className="btn btn-secondary btn-full" onClick={()=>setMode('login')}><Icon name="back" size={15}/>Voltar ao Login</button>
      </div>
    </div>
  );

  if (mode === 'register') return (
    <div className="login-wrap">
      <div className="login-bg"/>
      <div className="login-box" style={{width:420}}>
        <div className="login-logo"><span>JNM</span><p>Engenharia Industrial</p></div>
        <h2>Solicitar Cadastro</h2>
        {regMsg && <div className={regMsg.startsWith('✅') ? 'info-box' : 'err'}>{regMsg}</div>}
        <div className="field"><label>Nome Completo *</label><input value={regForm.name} onChange={e=>setRegForm(v=>({...v,name:e.target.value}))}/></div>
        <div className="field"><label>Nome de Usuário *</label><input value={regForm.username} onChange={e=>setRegForm(v=>({...v,username:e.target.value}))}/></div>
        <div className="field"><label>E-mail</label><input type="email" value={regForm.email} onChange={e=>setRegForm(v=>({...v,email:e.target.value}))}/></div>
        <div className="field"><label>Senha *</label><input type="password" value={regForm.password} onChange={e=>setRegForm(v=>({...v,password:e.target.value}))}/></div>
        <div className="field"><label>Confirmar Senha *</label><input type="password" value={regForm.confirm} onChange={e=>setRegForm(v=>({...v,confirm:e.target.value}))}/></div>
        <button className="btn btn-primary btn-full" style={{marginBottom:10}} onClick={handleRegister}><Icon name="check" size={15}/>Solicitar Cadastro</button>
        <button className="btn btn-secondary btn-full" onClick={()=>setMode('login')}><Icon name="back" size={15}/>Voltar</button>
      </div>
    </div>
  );

  return (
    <div className="login-wrap">
      <div className="login-bg"/>
      <div className="login-box">
        <div className="login-logo"><span>JNM</span><p>Engenharia Industrial</p></div>
        <h2>Acesso ao Sistema</h2>
        {err && <div className="err">{err}</div>}
        <div className="field"><label>Usuário</label><input value={u} onChange={e=>setU(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()} autoFocus/></div>
        <div className="field"><label>Senha</label><input type="password" value={p} onChange={e=>setP(e.target.value)} onKeyDown={e=>e.key==='Enter'&&submit()}/></div>
        <button className="btn btn-primary btn-full" style={{marginTop:8,marginBottom:12}} onClick={submit}>Entrar</button>
        <div style={{display:'flex',justifyContent:'space-between',marginTop:4}}>
          <button style={{background:'none',border:'none',color:'var(--text3)',fontSize:12,cursor:'pointer'}} onClick={()=>setMode('forgot')}>Esqueci a senha</button>
          <button style={{background:'none',border:'none',color:'var(--text3)',fontSize:12,cursor:'pointer'}} onClick={()=>setMode('register')}>Solicitar cadastro</button>
        </div>
      </div>
    </div>
  );
}

}

// ── DONUT CHART ──────────────────────────────────────────────────────────────
function Donut({ data, size=120 }) {
  const total = data.reduce((s,d)=>s+d.value,0);
  let offset = 0;
  const r = 45, circ = 2 * Math.PI * r;
  const slices = data.map(d => {
    const pct = total ? d.value/total : 0;
    const len = pct * circ;
    const slice = { ...d, offset, len: Math.max(0, len-2) };
    offset += len;
    return slice;
  });
  return (
    <div className="donut-wrap">
      <svg className="donut-svg" width={size} height={size} viewBox="0 0 100 100">
        <circle cx="50" cy="50" r={r} fill="none" stroke="var(--bg2)" strokeWidth="12"/>
        {slices.map((s,i) => (
          <circle key={i} cx="50" cy="50" r={r} fill="none" stroke={s.color} strokeWidth="12"
            strokeDasharray={`${s.len} ${circ-s.len}`}
            strokeDashoffset={circ/4 - s.offset}
            style={{transform:'rotate(-90deg)',transformOrigin:'50px 50px'}}/>
        ))}
        <text x="50" y="47" textAnchor="middle" fill="var(--text)" fontSize="14" fontWeight="700" fontFamily="Barlow Condensed">{total}</text>
        <text x="50" y="58" textAnchor="middle" fill="var(--text3)" fontSize="8">projetos</text>
      </svg>
      <div className="donut-legend">
        {data.map((d,i) => (
          <div key={i} className="legend-item">
            <div className="legend-dot" style={{background:d.color}}/>
            <span style={{color:'var(--text2)'}}>{d.label}</span>
            <strong style={{marginLeft:'auto',paddingLeft:12}}>{d.value}</strong>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── PARETO CHART COMPONENT ───────────────────────────────────────────────────
function ParetoChart({ data, barColor }) {
  if (!data || data.length === 0) return React.createElement('div', {className:'empty'}, React.createElement('p', null, 'Sem dados para exibir.'));
  const total = data.reduce((s, d) => s + d.value, 0);
  let cumSum = 0;
  const items = data.map(d => {
    cumSum += d.value;
    return { ...d, cumPct: total > 0 ? (cumSum / total) * 100 : 0 };
  });
  const maxVal = items[0]?.value || 1;
  const chartH = 160;
  const n = items.length;
  const barW = Math.max(24, Math.min(52, Math.floor(400 / n) - 6));
  const totalW = 44 + n * (barW + 6) + 10;

  return (
    <div style={{overflowX:'auto',paddingBottom:4}}>
      <svg width={Math.max(totalW,300)} height={chartH+76} style={{display:'block',margin:'0 auto',overflow:'visible'}}>
        {[0,25,50,75,100].map(pct => {
          const y = chartH - (pct/100)*chartH + 10;
          return <g key={pct}>
            <line x1={38} y1={y} x2={totalW-4} y2={y} stroke="var(--border)" strokeWidth="1" strokeDasharray={pct===0?'0':'3,3'}/>
            <text x={34} y={y+4} textAnchor="end" fontSize="9" fill="var(--text3)">{pct}%</text>
          </g>;
        })}
        {items.map((d,i) => {
          const barH = Math.max(2,(d.value/maxVal)*chartH);
          const x = 42 + i*(barW+6);
          const y = chartH - barH + 10;
          const maxChars = Math.max(4, Math.floor(barW/4.5));
          const lbl = d.label && d.label.length > maxChars ? d.label.slice(0,maxChars-1)+'…' : (d.label||'');
          return <g key={i}>
            <rect x={x} y={y} width={barW} height={barH} fill={barColor||'var(--accent)'} opacity="0.85" rx="2"/>
            <text x={x+barW/2} y={y-3} textAnchor="middle" fontSize="8" fill="var(--text2)" fontFamily="'Barlow Condensed',sans-serif">{Number(d.value).toLocaleString('pt-BR',{minimumFractionDigits:0,maximumFractionDigits:0})}</text>
            <foreignObject x={x} y={chartH+13} width={barW} height={48}>
              <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:'8px',color:'var(--text3)',wordBreak:'break-word',textAlign:'center',lineHeight:'1.25',overflow:'hidden',maxHeight:'46px'}} title={d.label}>{lbl}</div>
            </foreignObject>
          </g>;
        })}
        {items.length>1 && <polyline
          points={items.map((d,i)=>`${42+i*(barW+6)+barW/2},${chartH-(d.cumPct/100)*chartH+10}`).join(' ')}
          fill="none" stroke="#e74c3c" strokeWidth="2" strokeLinejoin="round"/>}
        {items.map((d,i) => {
          const x = 42+i*(barW+6)+barW/2;
          const y = chartH-(d.cumPct/100)*chartH+10;
          return <g key={i}>
            <circle cx={x} cy={y} r="3" fill="#e74c3c"/>
            <text x={x} y={y-5} textAnchor="middle" fontSize="8" fill="#e74c3c">{Math.round(d.cumPct)}%</text>
          </g>;
        })}
        <line x1={totalW-68} y1={8} x2={totalW-55} y2={8} stroke="#e74c3c" strokeWidth="2"/>
        <circle cx={totalW-61} cy={8} r="3" fill="#e74c3c"/>
        <text x={totalW-51} y={12} fontSize="9" fill="var(--text3)">% Acum.</text>
      </svg>
    </div>
  );
}

// ── DASHBOARD ────────────────────────────────────────────────────────────────

  const todayStr = today();

  const [paretoMOTop, setParetoMOTop] = useState(8);

  const stats = useMemo(() => {
    const andamento = projects.filter(p=>p.Status==='Em andamento').length;
    const concluido = projects.filter(p=>p.Status==='Concluido').length;
    const cancelado = projects.filter(p=>p.Status==='Cancelado').length;
    const standby = projects.filter(p=>['Stand by','Planejamento'].includes(p.Status)).length;
    const totalMat = materials.reduce((s,m)=>s+(m.Total||0),0);
    const totalMO = maoDeObra.reduce((s,m)=>s+(m.Total||0),0);
    return { andamento, concluido, cancelado, standby, total: totalMat+totalMO, totalMat, totalMO };
  }, [projects, materials, maoDeObra]);

  const alerts = useMemo(() => {
    const list = [];
    projects.filter(p=>p.Status==='Em andamento').forEach(p => {
      if (!p.Data_Prev_Termino) return;
      const diff = diffDays(todayStr, p.Data_Prev_Termino);
      if (diff < 0) list.push({ type:'error', title: p.Nome_Projeto, sub: `Atrasado ${Math.abs(diff)} dias — Prazo: ${fmtDate(p.Data_Prev_Termino)}`, code: p.Codigo });
      else if (diff <= 7) list.push({ type:'warn', title: p.Nome_Projeto, sub: `Vence em ${diff} dias — Prazo: ${fmtDate(p.Data_Prev_Termino)}`, code: p.Codigo });
    });
    return list;
  }, [projects]);

  const projCosts = useMemo(() => projects.map(p => {
    const mat = materials.filter(m=>m.Codigo_Projeto===p.Codigo).reduce((s,m)=>s+(m.Total||0),0);
    const mo = maoDeObra.filter(m=>m.Codigo_Projeto===p.Codigo).reduce((s,m)=>s+(m.Total||0),0);
    return { code: p.Codigo, name: p.Nome_Projeto, total: mat+mo };
  }).sort((a,b)=>b.total-a.total).slice(0,7), [projects, materials, maoDeObra]);

  const paretoMatData = useMemo(() => {
    const map = {};
    materials.forEach(m => { const k = m[paretoMatField]||'(vazio)'; map[k]=(map[k]||0)+(m.Total||0); });
    return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,paretoMatTop);
  }, [materials, paretoMatField, paretoMatTop]);

  const paretoMOData = useMemo(() => {
    const map = {};

    return Object.entries(map).map(([label,value])=>({label,value})).sort((a,b)=>b.value-a.value).slice(0,paretoMOTop);
  }, [maoDeObra, paretoMOField, paretoMOTop]);

    { label: 'Em andamento', value: stats.andamento, color: '#4a90d9' },
    { label: 'Concluídos', value: stats.concluido, color: '#27ae60' },
    { label: 'Standby/Plan.', value: stats.standby, color: '#f39c12' },

  const selStyle = {background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text)',padding:'4px 8px',borderRadius:'var(--radius)',fontSize:12,outline:'none'};

  return (
    <div>

      <div className="stats-grid">

        <div className="stat-card blue"><div className="stat-label">Em Andamento</div><div className="stat-value">{stats.andamento}</div><div className="stat-sub">em execução</div></div>
        <div className="stat-card green"><div className="stat-label">Custo Total</div><div className="stat-value" style={{fontSize:22}}>{fmt(stats.total)}</div><div className="stat-sub">materiais + mão de obra</div></div>
        <div className="stat-card red"><div className="stat-label">Alertas</div><div className="stat-value">{alerts.length}</div><div className="stat-sub">{alerts.filter(a=>a.type==='error').length} atrasados</div></div>
      </div>

        <div className="stat-card green"><div className="stat-label">Concluídos</div><div className="stat-value">{stats.concluido}</div></div>
      </div>
      {alerts.length > 0 && (
        <div className="chart-card" style={{marginBottom:16}}>
          <h3>⚠️ Alertas de Prazo</h3>
          <div className="alert-list">
            {alerts.map((a,i) => (

      </div>
      {/* Linha 2: Dois Paretos tradicionais lado a lado */}

        <div className="chart-card">
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:6}}>
            <h3 style={{margin:0,fontSize:13}}>Pareto — Materiais e Serviços</h3>

              <span style={{fontSize:10,color:'var(--text3)'}}>Agrupar:</span>
              <select style={selStyle} value={paretoMatField} onChange={e=>setParetoMatField(e.target.value)}>

            <div style={{display:'flex',gap:5,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:10,color:'var(--text3)'}}>Agrupar:</span>
              <select style={selStyle} value={paretoMOField} onChange={e=>setParetoMOField(e.target.value)}>
                <option value="Funcao">Função</option>

              <select style={selStyle} value={paretoMOTop} onChange={e=>setParetoMOTop(+e.target.value)}>

// ── PROJECTS LIST ─────────────────────────────────────────────────────────────
function ProjectsList({ projects, materials, maoDeObra, onView, onEdit, onDelete, listas, addProject, addToast, user }) {
  const [search, setSearch] = useState(''); const [statusF, setStatusF] = useState(''); const [clienteF, setClienteF] = useState('');
  const [showNew, setShowNew] = useState(false);
  const filtered = useMemo(() => projects.filter(p => {
    const q = search.toLowerCase();
    if (q && !p.Codigo?.toLowerCase().includes(q) && !p.Nome_Projeto?.toLowerCase().includes(q) && !p.Cliente?.toLowerCase().includes(q)) return false;
    if (statusF && p.Status !== statusF) return false;
    if (clienteF && p.Cliente !== clienteF) return false;
    return true;
  }), [projects, search, statusF, clienteF]);
  const clientes = [...new Set(projects.map(p=>p.Cliente).filter(Boolean))].sort();
  const getCost = (code) => {
    const mat = materials.filter(m=>m.Codigo_Projeto===code).reduce((s,m)=>s+(m.Total||0),0);
    const mo = maoDeObra.filter(m=>m.Codigo_Projeto===code).reduce((s,m)=>s+(m.Total||0),0);
    return mat + mo;
  };
  const computePreviewCode = (locNome, catNome) => {
    const loc = listas.localidades.find(l => l.nome === locNome);
    const codLoc = (loc ? loc.cod : 'JNM.01').replace('JNM ','JNM.');
    const catEntry = listas.categoriasProjeto.find(c => c.nome === catNome);
    let codCat;
    if (catEntry && catEntry.cod) codCat = catEntry.cod;
    else if (catNome) codCat = catNome.replace(/[^A-Za-z]/g,'').toUpperCase().slice(0,4).padEnd(4,'X');
    else codCat = 'PROJ';
    const nums = projects
      .filter(p => (p.Cod_Localidade||'').replace('JNM ','JNM.') === codLoc)
      .map(p => parseInt((p.Codigo||'').split('-')[1]||'0',10))
      .filter(n => !isNaN(n) && n > 0);
    const next = nums.length ? Math.max.apply(null,nums)+1 : 1;
    return codLoc+'-'+String(next).padStart(4,'0')+'-'+codCat;
  };

  const handleSave = (form) => {
    if (!form.Nome_Projeto || !form.Cliente) { addToast('Preencha Nome e Cliente.','error'); return; }
    addProject(form); setShowNew(false); addToast('Projeto cadastrado!','success');
  };
  return (
    <div>
      <div className="topbar">
        <h1 className="page-title">Projetos <span>({projects.length})</span></h1>
        <button className="btn btn-primary" onClick={()=>setShowNew(true)}><Icon name="plus" size={15}/>Novo Projeto</button>
      </div>
      {showNew && (
        <div className="table-wrap" style={{marginBottom:20,padding:24}}>
          <h3 style={{marginBottom:20,fontSize:18}}>Novo Projeto</h3>
          <ProjectForm listas={listas} onSave={handleSave} onCancel={()=>setShowNew(false)} user={user} computePreviewCode={computePreviewCode}/>
        </div>
      )}
      <div className="filter-row">
        <div className="search-bar" style={{flex:1,maxWidth:320}}>
          <Icon name="search" size={15}/>
          <input placeholder="Buscar por código, nome, cliente..." value={search} onChange={e=>setSearch(e.target.value)}/>
        </div>
        <select value={statusF} onChange={e=>setStatusF(e.target.value)}><option value="">Todos os Status</option>{listas.status.map(s=><option key={s}>{s}</option>)}</select>
        <select value={clienteF} onChange={e=>setClienteF(e.target.value)}><option value="">Todos os Clientes</option>{clientes.map(c=><option key={c}>{c}</option>)}</select>
        {(search||statusF||clienteF) && <button className="btn btn-sm btn-secondary" onClick={()=>{setSearch('');setStatusF('');setClienteF('');}}>Limpar</button>}
      </div>
      <div className="table-wrap">
        <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr><th>Código</th><th>Projeto</th><th>Cliente</th><th>Responsável</th><th>Status</th><th>Prazo</th><th>Custo Total</th><th>Ações</th></tr></thead>
            <tbody>
              {filtered.length === 0 && <tr><td colSpan={8}><div className="empty"><p>Nenhum projeto encontrado.</p></div></td></tr>}
              {filtered.map(p => (
                <tr key={p.Codigo}>
                  <td><span className="td-mono" style={{color:'var(--accent)'}}>{p.Codigo}</span></td>
                  <td style={{maxWidth:260}}><div style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.Nome_Projeto}</div></td>
                  <td>{p.Cliente}</td>
                  <td>{p.Responsavel}</td>
                  <td><span className={getBadgeClass(p.Status)}>{p.Status}</span></td>
                  <td style={{color: p.Data_Prev_Termino && p.Status==='Em andamento' && diffDays(today(),p.Data_Prev_Termino)<0 ? 'var(--red)' : 'var(--text2)', fontSize:13}}>{fmtDate(p.Data_Prev_Termino)||'—'}</td>
                  <td><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{fmt(getCost(p.Codigo))}</strong></td>
                  <td>
                    <div style={{display:'flex',gap:4}}>
                      <button className="btn btn-sm btn-secondary btn-icon" title="Ver detalhes" onClick={()=>onView(p.Codigo)}><Icon name="eye" size={14}/></button>
                      <button className="btn btn-sm btn-secondary btn-icon" title="Editar" onClick={()=>onEdit(p)}><Icon name="edit" size={14}/></button>
                      <button className="btn btn-sm btn-danger btn-icon" title="Excluir" onClick={()=>onDelete(p.Codigo)}><Icon name="trash" size={14}/></button>
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ── PROJECT DETAIL ───────────────────────────────────────────────────────────
function ProjectDetail({ code, projects, materials, maoDeObra, listas, onBack, onEdit, updateMaterials, updateMO, addToast }) {
  const project = projects.find(p=>p.Codigo===code);
  const [tab, setTab] = useState('mat');
  const [showAddMat, setShowAddMat] = useState(false);
  const [showAddMO, setShowAddMO] = useState(false);
  const [matForm, setMatForm] = useState({ Data:today(), Categoria:'', Descricao:'', Especificacao:'', Unidade:'unidade', Quantidade:1, Valor_Unit:0 });
  const [moForm, setMoForm] = useState({ Data:today(), Funcao:'Soldador', Valor_Hora:16.51, Horas:1 });
  // estado de edição inline
  const [editMatIdx, setEditMatIdx] = useState(null);
  const [editMatForm, setEditMatForm] = useState(null);
  const [editMOIdx, setEditMOIdx] = useState(null);
  const [editMOForm, setEditMOForm] = useState(null);
  // pesquisa no catálogo ao adicionar material
  const [catSearch, setCatSearch] = useState('');

  if (!project) return <div className="empty"><p>Projeto não encontrado.</p></div>;
  const projMat = materials.filter(m=>m.Codigo_Projeto===code);
  const projMO = maoDeObra.filter(m=>m.Codigo_Projeto===code);
  const totalMat = projMat.reduce((s,m)=>s+(m.Total||0),0);
  const totalMO = projMO.reduce((s,m)=>s+(m.Total||0),0);

  const handleFuncao = (funcao) => { const f = listas.funcoes.find(f=>f.funcao===funcao); setMoForm(v=>({...v,Funcao:funcao,Valor_Hora:f?.valor||v.Valor_Hora})); };
  const handleCatalog = (desc) => { const item = listas.catalogo.find(c=>c.Descricao===desc); if(item) setMatForm(v=>({...v,Descricao:desc,Especificacao:item.Especificacao||'',Unidade:item.Unidade||'unidade',Valor_Unit:item.Preco_Medio||0})); else setMatForm(v=>({...v,Descricao:desc})); };
  const saveMat = () => {
    if (!matForm.Descricao) { addToast('Informe a descrição.','error'); return; }
    const total = +(matForm.Quantidade * matForm.Valor_Unit).toFixed(2);
    updateMaterials(m => [...m, { ...matForm, Codigo_Projeto:code, Total:total, id:uid() }]);
    setMatForm({ Data:today(), Categoria:'', Descricao:'', Especificacao:'', Unidade:'unidade', Quantidade:1, Valor_Unit:0 });
    setCatSearch('');
    setShowAddMat(false); addToast('Material adicionado!','success');
  };
  const saveMO = () => {
    const total = +(moForm.Horas * moForm.Valor_Hora).toFixed(2);
    updateMO(m => [...m, { ...moForm, Codigo_Projeto:code, Total:total, id:uid() }]);
    setMoForm({ Data:today(), Funcao:'Soldador', Valor_Hora:16.51, Horas:1 });
    setShowAddMO(false); addToast('Mão de obra adicionada!','success');
  };
  // helpers para achar índice global pelo índice local do projeto
  const getProjMatGlobalIdx = (localIdx) => { let c=-1; return materials.findIndex(x=>{ if(x.Codigo_Projeto===code) c++; return c===localIdx; }); };
  const getProjMOGlobalIdx = (localIdx) => { let c=-1; return maoDeObra.findIndex(x=>{ if(x.Codigo_Projeto===code) c++; return c===localIdx; }); };
  const delMat = (idx) => { const gi=getProjMatGlobalIdx(idx); updateMaterials(m=>m.filter((_,i)=>i!==gi)); };
  const delMO  = (idx) => { const gi=getProjMOGlobalIdx(idx); updateMO(m=>m.filter((_,i)=>i!==gi)); };
  // editar mat inline
  const startEditMat = (idx) => { setEditMatIdx(idx); setEditMatForm({...projMat[idx]}); setShowAddMat(false); };
  const saveEditMat = () => {
    const total = +(editMatForm.Quantidade * editMatForm.Valor_Unit).toFixed(2);
    const gi = getProjMatGlobalIdx(editMatIdx);
    updateMaterials(m => m.map((x,i)=>i===gi?{...editMatForm,Total:total}:x));
    setEditMatIdx(null); setEditMatForm(null); addToast('Material atualizado!','success');
  };
  // editar MO inline
  const startEditMO = (idx) => { setEditMOIdx(idx); setEditMOForm({...projMO[idx]}); setShowAddMO(false); };
  const saveEditMO = () => {
    const total = +(editMOForm.Horas * editMOForm.Valor_Hora).toFixed(2);
    const gi = getProjMOGlobalIdx(editMOIdx);
    updateMO(m => m.map((x,i)=>i===gi?{...editMOForm,Total:total}:x));
    setEditMOIdx(null); setEditMOForm(null); addToast('Mão de obra atualizada!','success');
  };
  // catálogo filtrado por categoria e por pesquisa de texto
  const catMatFiltered = listas.catalogo
    .filter(c=>(!matForm.Categoria||c.Categoria===matForm.Categoria)&&(!catSearch||c.Descricao.toLowerCase().includes(catSearch.toLowerCase())))
    .sort((a,b)=>(a.Descricao||'').localeCompare(b.Descricao||'','pt-BR'));

  return (
    <div>
      <div className="topbar">
        <div style={{display:'flex',alignItems:'center',gap:12}}>
          <button className="btn btn-secondary btn-sm" onClick={onBack}><Icon name="back" size={14}/>Voltar</button>
          <h1 className="page-title" style={{fontSize:22}}>{project.Nome_Projeto}</h1>
        </div>
        <button className="btn btn-secondary" onClick={()=>onEdit(project)}><Icon name="edit" size={14}/>Editar Projeto</button>
      </div>
      <div className="proj-detail-header">
        <div className="proj-code">{project.Codigo}</div>
        <div className="proj-name">{project.Nome_Projeto}</div>
        <div className="proj-meta">
          <div className="proj-meta-item">Cliente: <strong>{project.Cliente}</strong></div>
          <div className="proj-meta-item">Responsável: <strong>{project.Responsavel}</strong></div>
          <div className="proj-meta-item">Status: <span className={getBadgeClass(project.Status)}>{project.Status}</span></div>
          <div className="proj-meta-item">Localidade: <strong>{project.Localidade}</strong></div>
          <div className="proj-meta-item">Categoria: <strong>{project.Categoria_Projeto}</strong></div>
          <div className="proj-meta-item">Início: <strong>{fmtDate(project.Data_Inicio)}</strong></div>
          <div className="proj-meta-item">Prazo: <strong>{fmtDate(project.Data_Prev_Termino)||'—'}</strong></div>
          {project.Revisao && <div className="proj-meta-item">Rev: <strong>{project.Revisao}</strong></div>}
        </div>
        {project.Objetivo && <p style={{marginTop:12,fontSize:13,color:'var(--text2)'}}><strong>Objetivo:</strong> {project.Objetivo}</p>}
        {project.Observacoes && <p style={{marginTop:6,fontSize:13,color:'var(--text3)'}}><strong>Obs:</strong> {project.Observacoes}</p>}
        <div className="cost-summary">
          <div className="cost-box"><div className="cost-box-label">Materiais e Serviços</div><div className="cost-box-value">{fmt(totalMat)}</div></div>
          <div className="cost-box"><div className="cost-box-label">Mão de Obra</div><div className="cost-box-value">{fmt(totalMO)}</div></div>
          <div className="cost-box" style={{borderColor:'var(--accent)'}}><div className="cost-box-label">Custo Total</div><div className="cost-box-value">{fmt(totalMat+totalMO)}</div></div>
        </div>
      </div>
      <div className="tabs">
        <div className={`tab ${tab==='mat'?'active':''}`} onClick={()=>setTab('mat')}>Materiais e Serviços ({projMat.length})</div>
        <div className={`tab ${tab==='mo'?'active':''}`} onClick={()=>setTab('mo')}>Mão de Obra ({projMO.length})</div>
      </div>
      {tab==='mat' && (
        <div className="table-wrap">
          <div className="table-header"><h3>Materiais e Serviços</h3><button className="btn btn-primary btn-sm" onClick={()=>{setShowAddMat(!showAddMat);setEditMatIdx(null);}}><Icon name="plus" size={13}/>Adicionar</button></div>
          {showAddMat && (
            <div style={{padding:20,borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
              <div className="form-grid">
                <div className="field"><label>Categoria</label><select value={matForm.Categoria} onChange={e=>setMatForm(v=>({...v,Categoria:e.target.value,Descricao:''}))}>  <option value="">— Selecione —</option>{listas.categorias.map(c=><option key={c}>{c}</option>)}</select></div>
                <div className="field"><label>🔍 Pesquisar no Catálogo</label>
                  <input placeholder="Digite para filtrar..." value={catSearch} onChange={e=>setCatSearch(e.target.value)} style={{marginBottom:4}}/>
                  <select value={matForm.Descricao} onChange={e=>handleCatalog(e.target.value)} size={catSearch||matForm.Categoria?Math.min(5,catMatFiltered.length+1):1} style={{marginTop:2}}>
                    <option value="">— {catMatFiltered.length} item(ns) —</option>
                    {catMatFiltered.map((c,i)=><option key={i} value={c.Descricao}>{c.Descricao} ({c.Categoria})</option>)}
                  </select>
                </div>
                <div className="field"><label>Descrição (manual)</label><input value={matForm.Descricao} onChange={e=>setMatForm(v=>({...v,Descricao:e.target.value}))}/></div>
                <div className="field"><label>Especificação</label><input value={matForm.Especificacao} onChange={e=>setMatForm(v=>({...v,Especificacao:e.target.value}))}/></div>
                <div className="field"><label>Unidade</label><select value={matForm.Unidade} onChange={e=>setMatForm(v=>({...v,Unidade:e.target.value}))}>{listas.unidades.map(u=><option key={u}>{u}</option>)}</select></div>
                <div className="field"><label>Data</label><input type="date" value={matForm.Data} onChange={e=>setMatForm(v=>({...v,Data:e.target.value}))}/></div>
                <div className="field"><label>Quantidade</label><input type="number" step="0.001" value={matForm.Quantidade} onChange={e=>setMatForm(v=>({...v,Quantidade:+e.target.value}))}/></div>
                <div className="field"><label>Valor Unitário (R$)</label><input type="number" step="0.01" value={matForm.Valor_Unit} onChange={e=>setMatForm(v=>({...v,Valor_Unit:+e.target.value}))}/></div>
                <div className="field"><label>Total</label><input readOnly value={fmt(matForm.Quantidade*matForm.Valor_Unit)} style={{color:'var(--accent)',fontWeight:700}}/></div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-success" onClick={saveMat}><Icon name="check" size={14}/>Salvar</button><button className="btn btn-secondary" onClick={()=>{setShowAddMat(false);setCatSearch('');}}>Cancelar</button></div>
              </div>
            </div>
          )}
          {/* Formulário de edição inline de material */}
          {editMatIdx!==null && editMatForm && (
            <div style={{padding:20,borderBottom:'1px solid var(--border)',background:'rgba(245,166,35,0.05)',borderLeft:'3px solid var(--accent)'}}>
              <div style={{marginBottom:12,fontWeight:700,color:'var(--accent)',fontSize:13}}>✏️ Editando: {projMat[editMatIdx]?.Descricao}</div>
              <div className="form-grid">
                <div className="field"><label>Categoria</label><select value={editMatForm.Categoria} onChange={e=>setEditMatForm(v=>({...v,Categoria:e.target.value}))}><option value="">—</option>{listas.categorias.map(c=><option key={c}>{c}</option>)}</select></div>
                <div className="field"><label>Descrição</label><input value={editMatForm.Descricao} onChange={e=>setEditMatForm(v=>({...v,Descricao:e.target.value}))}/></div>
                <div className="field"><label>Especificação</label><input value={editMatForm.Especificacao||''} onChange={e=>setEditMatForm(v=>({...v,Especificacao:e.target.value}))}/></div>
                <div className="field"><label>Unidade</label><select value={editMatForm.Unidade} onChange={e=>setEditMatForm(v=>({...v,Unidade:e.target.value}))}>{listas.unidades.map(u=><option key={u}>{u}</option>)}</select></div>
                <div className="field"><label>Data</label><input type="date" value={editMatForm.Data||''} onChange={e=>setEditMatForm(v=>({...v,Data:e.target.value}))}/></div>
                <div className="field"><label>Quantidade</label><input type="number" step="0.001" value={editMatForm.Quantidade} onChange={e=>setEditMatForm(v=>({...v,Quantidade:+e.target.value}))}/></div>
                <div className="field"><label>Valor Unitário (R$)</label><input type="number" step="0.01" value={editMatForm.Valor_Unit} onChange={e=>setEditMatForm(v=>({...v,Valor_Unit:+e.target.value}))}/></div>
                <div className="field"><label>Total Calculado</label><input readOnly value={fmt(editMatForm.Quantidade*editMatForm.Valor_Unit)} style={{color:'var(--accent)',fontWeight:700}}/></div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-primary" onClick={saveEditMat}><Icon name="check" size={14}/>Atualizar</button><button className="btn btn-secondary" onClick={()=>{setEditMatIdx(null);setEditMatForm(null);}}>Cancelar</button></div>
              </div>
            </div>
          )}
          <div style={{overflowX:'auto'}}>
            <table>
              <thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Especificação</th><th>Un.</th><th>Qtd.</th><th>Valor Unit.</th><th>Total</th><th></th></tr></thead>
              <tbody>
                {projMat.length===0 && <tr><td colSpan={9}><div className="empty"><p>Nenhum material lançado.</p></div></td></tr>}
                {projMat.map((m,i) => (
                  <tr key={i} style={editMatIdx===i?{background:'rgba(245,166,35,0.06)'}:{}}>
                    <td style={{color:'var(--text3)',fontSize:12}}>{fmtDate(m.Data)}</td>
                    <td><span style={{fontSize:11,background:'var(--bg2)',padding:'2px 8px',borderRadius:4,color:'var(--text2)'}}>{m.Categoria}</span></td>
                    <td><strong>{m.Descricao}</strong></td>
                    <td style={{color:'var(--text3)',fontSize:12}}>{m.Especificacao}</td>
                    <td>{m.Unidade}</td>
                    <td style={{textAlign:'right'}}>{fmtN(m.Quantidade)}</td>
                    <td style={{textAlign:'right'}}>{fmt(m.Valor_Unit)}</td>
                    <td style={{textAlign:'right'}}><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{fmt(m.Total)}</strong></td>
                    <td>
                      <div style={{display:'flex',gap:3}}>
                        <button className="btn btn-secondary btn-icon btn-sm" title="Editar" onClick={()=>startEditMat(i)}><Icon name="edit" size={13}/></button>
                        <button className="btn btn-danger btn-icon btn-sm" title="Excluir" onClick={()=>delMat(i)}><Icon name="trash" size={13}/></button>
                      </div>
                    </td>
                  </tr>
                ))}
                {projMat.length>0 && <tr style={{background:'var(--bg2)'}}><td colSpan={7} style={{textAlign:'right',fontWeight:700,color:'var(--text2)'}}>TOTAL MATERIAIS</td><td style={{textAlign:'right'}}><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:16}}>{fmt(totalMat)}</strong></td><td/></tr>}
              </tbody>
            </table>
          </div>
        </div>
      )}
      {tab==='mo' && (
        <div className="table-wrap">
          <div className="table-header"><h3>Mão de Obra</h3><button className="btn btn-primary btn-sm" onClick={()=>{setShowAddMO(!showAddMO);setEditMOIdx(null);}}><Icon name="plus" size={13}/>Adicionar</button></div>
          {showAddMO && (
            <div style={{padding:20,borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
              <div className="form-grid">
                <div className="field"><label>Data</label><input type="date" value={moForm.Data} onChange={e=>setMoForm(v=>({...v,Data:e.target.value}))}/></div>
                <div className="field"><label>Função *</label><select value={moForm.Funcao} onChange={e=>handleFuncao(e.target.value)}>{listas.funcoes.map(f=><option key={f.funcao}>{f.funcao}</option>)}</select></div>
                <div className="field"><label>Valor/Hora (R$/h)</label><input type="number" step="0.01" value={moForm.Valor_Hora} onChange={e=>setMoForm(v=>({...v,Valor_Hora:+e.target.value}))}/></div>
                <div className="field"><label>Horas Trabalhadas</label><input type="number" step="0.5" value={moForm.Horas} onChange={e=>setMoForm(v=>({...v,Horas:+e.target.value}))}/></div>
                <div className="field"><label>Total</label><input readOnly value={fmt(moForm.Horas*moForm.Valor_Hora)} style={{color:'var(--accent)',fontWeight:700}}/></div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-success" onClick={saveMO}><Icon name="check" size={14}/>Salvar</button><button className="btn btn-secondary" onClick={()=>setShowAddMO(false)}>Cancelar</button></div>
              </div>
            </div>
          )}
          {/* Formulário de edição inline de MO */}
          {editMOIdx!==null && editMOForm && (
            <div style={{padding:20,borderBottom:'1px solid var(--border)',background:'rgba(245,166,35,0.05)',borderLeft:'3px solid var(--accent)'}}>
              <div style={{marginBottom:12,fontWeight:700,color:'var(--accent)',fontSize:13}}>✏️ Editando: {projMO[editMOIdx]?.Funcao}</div>
              <div className="form-grid">
                <div className="field"><label>Data</label><input type="date" value={editMOForm.Data||''} onChange={e=>setEditMOForm(v=>({...v,Data:e.target.value}))}/></div>
                <div className="field"><label>Função</label><select value={editMOForm.Funcao} onChange={e=>{const f=listas.funcoes.find(x=>x.funcao===e.target.value);setEditMOForm(v=>({...v,Funcao:e.target.value,Valor_Hora:f?.valor||v.Valor_Hora}));}}>{listas.funcoes.map(f=><option key={f.funcao}>{f.funcao}</option>)}</select></div>
                <div className="field"><label>Valor/Hora (R$/h)</label><input type="number" step="0.01" value={editMOForm.Valor_Hora} onChange={e=>setEditMOForm(v=>({...v,Valor_Hora:+e.target.value}))}/></div>
                <div className="field"><label>Horas</label><input type="number" step="0.5" value={editMOForm.Horas} onChange={e=>setEditMOForm(v=>({...v,Horas:+e.target.value}))}/></div>
                <div className="field"><label>Total Calculado</label><input readOnly value={fmt(editMOForm.Horas*editMOForm.Valor_Hora)} style={{color:'var(--accent)',fontWeight:700}}/></div>
                <div style={{display:'flex',gap:8,alignItems:'flex-end'}}><button className="btn btn-primary" onClick={saveEditMO}><Icon name="check" size={14}/>Atualizar</button><button className="btn btn-secondary" onClick={()=>{setEditMOIdx(null);setEditMOForm(null);}}>Cancelar</button></div>
              </div>
            </div>
          )}
          <table>
            <thead><tr><th>Data</th><th>Função</th><th>Valor/Hora</th><th>Horas</th><th>Total</th><th></th></tr></thead>
            <tbody>
              {projMO.length===0 && <tr><td colSpan={6}><div className="empty"><p>Nenhuma mão de obra lançada.</p></div></td></tr>}
              {projMO.map((m,i) => (
                <tr key={i} style={editMOIdx===i?{background:'rgba(245,166,35,0.06)'}:{}}>
                  <td style={{color:'var(--text3)',fontSize:12}}>{fmtDate(m.Data)}</td>
                  <td><strong>{m.Funcao}</strong></td>
                  <td>{fmt(m.Valor_Hora)}/h</td>
                  <td>{m.Horas}h</td>
                  <td><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:15}}>{fmt(m.Total)}</strong></td>
                  <td>
                    <div style={{display:'flex',gap:3}}>
                      <button className="btn btn-secondary btn-icon btn-sm" title="Editar" onClick={()=>startEditMO(i)}><Icon name="edit" size={13}/></button>
                      <button className="btn btn-danger btn-icon btn-sm" title="Excluir" onClick={()=>delMO(i)}><Icon name="trash" size={13}/></button>
                    </div>
                  </td>
                </tr>
              ))}
              {projMO.length>0 && <tr style={{background:'var(--bg2)'}}><td colSpan={4} style={{textAlign:'right',fontWeight:700,color:'var(--text2)'}}>TOTAL MÃO DE OBRA</td><td><strong style={{color:'var(--accent)',fontFamily:"'Barlow Condensed',sans-serif",fontSize:16}}>{fmt(totalMO)}</strong></td><td/></tr>}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

// ── CONFIGURAÇÕES BD (era "Banco de Dados") ── C.1 ───────────────────────────
function DatabasePage({ listas, updateListas, addToast }) {
  const [tab, setTab] = useState('funcoes');
  // Funções

  const [editCatIdx, setEditCatIdx] = useState(null);
  const [editCatVal, setEditCatVal] = useState('');

  const addFuncao = () => {
    if(!newFuncao) return;
    updateListas(l=>({...l,funcoes:[...l.funcoes,{funcao:newFuncao,valor:+newValor}]}));
    setNewFuncao(''); setNewValor(''); addToast('Função adicionada!','success');
  };
  const delFuncao = (i) => { if(!confirm('Excluir função?')) return; updateListas(l=>({...l,funcoes:l.funcoes.filter((_,ii)=>ii!==i)})); addToast('Função removida.','info'); };
  const startEditFuncao = (i) => { setEditFuncaoIdx(i); setEditFuncaoForm({...listas.funcoes[i]}); };
  const saveEditFuncao = () => {
    if(!editFuncaoForm.funcao) return;
    updateListas(l=>({...l,funcoes:l.funcoes.map((f,i)=>i===editFuncaoIdx?{...editFuncaoForm,valor:+editFuncaoForm.valor}:f)}));
    setEditFuncaoIdx(null); addToast('Função atualizada!','success');
  };

  const addCategoria = () => {
    if(!newCat) return;
    updateListas(l=>({...l,categorias:[...l.categorias,newCat]}));
    setNewCat(''); addToast('Categoria adicionada!','success');
  };
  const delCategoria = (i) => { if(!confirm('Excluir categoria?')) return; updateListas(l=>({...l,categorias:l.categorias.filter((_,ii)=>ii!==i)})); addToast('Categoria removida.','info'); };
  const startEditCat = (i) => { setEditCatIdx(i); setEditCatVal(listas.categorias[i]); };
  const saveEditCat = () => {
    if(!editCatVal) return;
    updateListas(l=>({...l,categorias:l.categorias.map((c,i)=>i===editCatIdx?editCatVal:c)}));
    setEditCatIdx(null); addToast('Categoria atualizada!','success');

  return (
    <div>
      <div className="topbar"><h1 className="page-title">Configurações <span>BD</span></h1></div>
      <div className="tabs">
        <div className={`tab ${tab==='funcoes'?'active':''}`} onClick={()=>setTab('funcoes')}>Funções / MO</div>

        <div className={`tab ${tab==='status'?'active':''}`} onClick={()=>setTab('status')}>Status</div>
        <div className={`tab ${tab==='localidades'?'active':''}`} onClick={()=>setTab('localidades')}>Localidades</div>

      {tab==='funcoes' && (
        <div className="table-wrap">
          <div className="table-header"><h3>Funções e Valores/Hora</h3></div>
          <div style={{padding:16,display:'flex',gap:8,borderBottom:'1px solid var(--border)'}}>
            <input style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} placeholder="Nome da função" value={newFuncao} onChange={e=>setNewFuncao(e.target.value)}/>
            <input style={{width:140,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} type="number" placeholder="R$/hora" value={newValor} onChange={e=>setNewValor(e.target.value)}/>
            <button className="btn btn-primary" onClick={addFuncao}><Icon name="plus" size={14}/>Adicionar</button>
          </div>
          {editFuncaoIdx !== null && (
            <div style={{padding:16,background:'rgba(245,166,35,0.06)',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--accent)',fontWeight:700,minWidth:80}}>✏️ Editando:</span>
              <input style={{flex:1,background:'var(--bg2)',border:'1px solid var(--accent)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} value={editFuncaoForm.funcao} onChange={e=>setEditFuncaoForm(v=>({...v,funcao:e.target.value}))}/>
              <input style={{width:140,background:'var(--bg2)',border:'1px solid var(--accent)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} type="number" value={editFuncaoForm.valor} onChange={e=>setEditFuncaoForm(v=>({...v,valor:e.target.value}))}/>
              <button className="btn btn-primary btn-sm" onClick={saveEditFuncao}><Icon name="check" size={13}/>Salvar</button>
              <button className="btn btn-secondary btn-sm" onClick={()=>setEditFuncaoIdx(null)}>Cancelar</button>
            </div>
          )}
          <table>
            <thead><tr><th>Função</th><th>Valor/Hora (R$)</th><th style={{textAlign:'center'}}>Ações</th></tr></thead>
            <tbody>{listas.funcoes.map((f,i)=>(

      {tab==='categorias' && (
        <div className="table-wrap">
          <div className="table-header"><h3>Categorias de Material / Serviço</h3></div>
          <div style={{padding:16,display:'flex',gap:8,borderBottom:'1px solid var(--border)'}}>
            <input style={{flex:1,background:'var(--bg2)',border:'1px solid var(--border)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} placeholder="Nova categoria" value={newCat} onChange={e=>setNewCat(e.target.value)}/>
            <button className="btn btn-primary" onClick={addCategoria}><Icon name="plus" size={14}/>Adicionar</button>
          </div>
          {editCatIdx !== null && (
            <div style={{padding:16,background:'rgba(245,166,35,0.06)',borderBottom:'1px solid var(--border)',display:'flex',gap:8,alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--accent)',fontWeight:700,minWidth:80}}>✏️ Editando:</span>
              <input style={{flex:1,background:'var(--bg2)',border:'1px solid var(--accent)',color:'var(--text)',padding:'8px 12px',borderRadius:'var(--radius)',fontSize:14}} value={editCatVal} onChange={e=>setEditCatVal(e.target.value)}/>

                <td>

                    <button className="btn btn-danger btn-icon btn-sm" title="Excluir" onClick={()=>delCategoria(i)}><Icon name="trash" size={13}/></button>

            ))}</tbody>

      {tab==='status' && (
